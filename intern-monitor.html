<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实习生用工比例监测 - 行业一部</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f8f9fa; color: #333; }
  .header { background: linear-gradient(135deg, #ff2442, #ff6b6b); color: white; padding: 24px 32px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .cards { display: flex; gap: 16px; padding: 24px 32px; flex-wrap: wrap; }
  .card { background: white; border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 160px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card .val { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .card .lbl { font-size: 13px; color: #888; }
  .card.warn .val { color: #ef4444; }
  .card.ok .val { color: #22c55e; }
  .card.neutral .val { color: #3b82f6; }
  .section { margin: 0 32px 24px; background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; }
  .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #444; }
  .chart-wrap { position: relative; }
  .baseline-note { font-size: 12px; color: #888; margin-top: 8px; }
  footer { text-align: center; font-size: 12px; color: #aaa; padding: 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>实习生用工比例监测 · 行业一部</h1>
  <p>更新时间：2026-04-13 | 数据来源：HR花名册（人员类别=全部）</p>
</div>

<div class="cards">
  <div class="card ok">
    <div class="val">23.5%</div>
    <div class="lbl">整体比例 ✅</div>
  </div>
  <div class="card neutral">
    <div class="val">39</div>
    <div class="lbl">实习生人数</div>
  </div>
  <div class="card neutral">
    <div class="val">166</div>
    <div class="lbl">正式员工人数</div>
  </div>
  <div class="card warn">
    <div class="val">10</div>
    <div class="lbl">超标小组数</div>
  </div>
  <div class="card neutral">
    <div class="val">24.7%</div>
    <div class="lbl">基准线</div>
  </div>
</div>

<div class="section">
  <h2>📈 整体比例历史趋势（近9天）</h2>
  <div class="chart-wrap" style="height:220px">
    <canvas id="trendChart"></canvas>
  </div>
  <p class="baseline-note">红虚线 = 基准值 24.7%</p>
</div>

<div class="section">
  <h2>📊 各小组比例（2026-04-13）</h2>
  <div class="chart-wrap" style="height:700px">
    <canvas id="groupChart"></canvas>
  </div>
  <p class="baseline-note">红色 = 超标（>24.7%）| 绿色 = 正常 | 竖线 = 基准值</p>
</div>

<footer>行业一部实习生用工比例自动监测 · 招财</footer>

<script>
const trendCtx = document.getElementById('trendChart').getContext('2d');
new Chart(trendCtx, {
  type: 'line',
  data: {
    labels: ["04-01", "04-02", "04-04", "04-06", "04-07", "04-08", "04-11", "04-12", "04-13"],
    datasets: [{
      label: '整体比例(%)',
      data: [24.1, 23.4, 24.1, 24.1, 24.1, 24.2, 23.5, 23.5, 23.5],
      borderColor: '#ff2442',
      backgroundColor: 'rgba(255,36,66,0.08)',
      fill: true,
      tension: 0.3,
      pointRadius: 4,
      pointBackgroundColor: '#ff2442'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      annotation: {}
    },
    scales: {
      y: {
        min: 0,
        max: 35,
        ticks: { callback: v => v + '%' },
        grid: { color: 'rgba(0,0,0,0.05)' }
      },
      x: { grid: { display: false } }
    }
  },
  plugins: [{
    id: 'baseline',
    beforeDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      const y = scales.y.getPixelForValue(24.7);
      ctx.save();
      ctx.strokeStyle = 'rgba(239,68,68,0.6)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(chartArea.left, y);
      ctx.lineTo(chartArea.right, y);
      ctx.stroke();
      ctx.restore();
    }
  }]
});

const groupCtx = document.getElementById('groupChart').getContext('2d');
new Chart(groupCtx, {
  type: 'bar',
  data: {
    labels: ["\u884c\u4e1a\u4e00\u7ec4", "\u884c\u4e1a\u4e8c\u7ec4", "\u884c\u4e1a\u4e09\u7ec4", "\u884c\u4e1a\u56db\u7ec4", "\u884c\u4e1a\u4e94\u7ec4", "\u884c\u4e1a\u516d\u7ec4", "\u884c\u4e1a\u4e03\u7ec4", "\u884c\u4e1a\u516b\u7ec4", "\u884c\u4e1a\u4e5d\u7ec4", "\u884c\u4e1a\u5341\u7ec4", "\u884c\u4e1a\u5341\u4e00\u7ec4", "\u884c\u4e1a\u5341\u4e8c\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e00\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e8c\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e09\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u56db\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e94\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u516d\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e03\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u516b\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u4e5d\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u5341\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u5341\u4e00\u7ec4", "\u5e73\u53f0\u4e13\u5bb6\u5341\u4e8c\u7ec4", "\u884c\u4e1a\u7b56\u7565\u7ec4"],
    datasets: [{
      label: '实习生比例(%)',
      data: [22.2, 33.3, 11.1, 20.0, 20.0, 18.2, 25.0, 16.7, 12.5, 22.2, 20.0, 75.0, 33.3, 11.1, 14.3, 25.0, 0.0, 40.0, 44.4, 20.0, 14.3, 33.3, 0.0, 40.0, 50.0],
      backgroundColor: ["rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(34,197,94,0.8)", "rgba(239,68,68,0.8)", "rgba(239,68,68,0.8)"],
      borderRadius: 4
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => {
            const i = ctx.dataIndex;
            const interns = [2, 3, 1, 1, 1, 2, 3, 1, 1, 2, 1, 3, 2, 1, 1, 1, 0, 2, 4, 1, 1, 2, 0, 2, 1];
            const regs = [9, 9, 9, 5, 5, 11, 12, 6, 8, 9, 5, 4, 6, 9, 7, 4, 5, 5, 9, 5, 7, 6, 4, 5, 2];
            return ` ${ctx.raw}%（实习${interns[i]} / 正式${regs[i]}）`;
          }
        }
      }
    },
    scales: {
      x: {
        min: 0,
        max: 80,
        ticks: { callback: v => v + '%' },
        grid: { color: 'rgba(0,0,0,0.05)' }
      },
      y: { grid: { display: false } }
    }
  },
  plugins: [{
    id: 'baseline',
    beforeDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      const x = scales.x.getPixelForValue(24.7);
      ctx.save();
      ctx.strokeStyle = 'rgba(239,68,68,0.7)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.stroke();
      ctx.restore();
    }
  }]
});
</script>
</body>
</html>
