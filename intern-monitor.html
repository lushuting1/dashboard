<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>

  .card { background: white; border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 120px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; }
  .card .val { font-size: 26px; font-weight: 700; }
  .card .lbl { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .chart-box { background: white; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

    ]
