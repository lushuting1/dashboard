<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC 管理看板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#F0F4F1;color:#1a1a1a;font-size:14px;line-height:1.5}
a{color:#1a7a4a;text-decoration:none}
a:hover{text-decoration:underline}

/* ── TOP NAV ── */
.topnav{background:linear-gradient(135deg,#1a5c36 0%,#2d8653 60%,#1e7a47 100%);padding:0 32px;display:flex;align-items:stretch;gap:0;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.topnav-brand{display:flex;align-items:center;gap:10px;padding:14px 0;margin-right:32px}
.topnav-logo{font-size:24px}
.topnav-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:.3px}
.topnav-tabs{display:flex;gap:0;align-items:stretch}
.nav-tab{background:none;border:none;padding:0 22px;font-size:14px;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:rgba(255,255,255,.9)}
.nav-tab.active{color:#fff;border-bottom-color:#7FFFD4;font-weight:700}
.topnav-time{margin-left:auto;display:flex;align-items:center;font-size:12px;color:rgba(255,255,255,.5);padding:14px 0}

/* ── OVERVIEW STRIP ── */
.overview-strip{background:#fff;border-bottom:1px solid #E4EDE8;padding:0 32px}
.overview-row{display:flex;gap:0;overflow-x:auto}
.ov-card{flex:1;min-width:120px;padding:16px 20px;border-right:1px solid #EEF3EF;cursor:pointer;transition:background .15s;position:relative}
.ov-card:last-child{border-right:none}
.ov-card:hover{background:#F4FAF6}
.ov-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.ov-total{font-size:26px;font-weight:800;color:#1a1a1a;line-height:1}
.ov-total.gap-red{color:#E53935}
.ov-total.gap-grn{color:#2e7d32}
.ov-breakdown{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.ov-seg{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
.ov-seg.biz{background:#E8F5E9;color:#2e7d32}
.ov-seg.ecom{background:#E3F2FD;color:#1565c0}
.ov-seg.func{background:#FFF3E0;color:#e65100}

/* ── ALERT BAR ── */
.alert-bar{margin:16px 32px;background:#FFFBF0;border:1px solid #FFD54F;border-radius:10px;padding:12px 18px;display:flex;align-items:flex-start;gap:10px}
.alert-bar.hidden{display:none}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-title{font-weight:700;font-size:13px;color:#B45309;margin-bottom:5px}
.alert-tags{display:flex;flex-wrap:wrap;gap:6px}
.alert-tag{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:600}
.alert-tag.vacancy{background:#FFEBEE;color:#c62828;border:1px solid #EF9A9A}
.alert-tag.overstaff{background:#F1F8E9;color:#2e7d32;border:1px solid #A5D6A7}

/* ── TAB PANELS ── */
.tab-panel{display:none;padding:20px 32px 48px}
.tab-panel.active{display:block}

/* ── DEPT GRID (multi-column for many depts) ── */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:16px}

/* ── DEPT CARD ── */
.dept-card{background:#fff;border-radius:12px;border:1px solid #E4EDE8;overflow:hidden;transition:box-shadow .15s}
.dept-card:hover{box-shadow:0 4px 20px rgba(26,92,54,.1)}

.dept-head{padding:16px 20px 12px;border-bottom:1px solid #F0F5F1}
.dept-head-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dept-name{font-size:15px;font-weight:700;color:#1a1a1a}
.dept-lv{font-size:11px;background:#E8F5E9;color:#2e7d32;border-radius:5px;padding:2px 8px;font-weight:700}
.dept-leader{font-size:12px;color:#888;margin-left:auto}
.gap-pill{font-size:12px;font-weight:700;border-radius:20px;padding:3px 12px}
.gap-pill.v{background:#FFEBEE;color:#c62828;border:1px solid #EF9A9A}
.gap-pill.o{background:#F1F8E9;color:#2e7d32;border:1px solid #A5D6A7}
.gap-pill.f{background:#F5F5F5;color:#888;border:1px solid #DDD}

.dept-metrics{padding:12px 20px;display:flex;gap:0;border-bottom:1px solid #F5F8F5}
.metric{flex:1;text-align:center;border-right:1px solid #F0F5F1}
.metric:last-child{border-right:none}
.metric-val{font-size:20px;font-weight:800;color:#1a1a1a;line-height:1}
.metric-val.in{color:#1976d2}
.metric-val.out{color:#c62828}
.metric-val.gap-r{color:#c62828}
.metric-val.gap-g{color:#2e7d32}
.metric-lbl{font-size:10px;color:#aaa;margin-top:3px}

.dept-flow{padding:10px 20px;display:flex;gap:12px;border-bottom:1px solid #F5F8F5;flex-wrap:wrap}
.flow-block{flex:1;min-width:130px;background:#FAFCFA;border-radius:8px;padding:8px 12px}
.flow-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.flow-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0}
.flow-key{color:#666}
.flow-num{font-weight:700}
.flow-num.blue{color:#1976d2}
.flow-num.red{color:#c62828}
.flow-num.gray{color:#bbb}

/* ── PEOPLE PILLS (L1 入职) ── */
.dept-l1{padding:10px 20px;border-bottom:1px solid #F5F8F5}
.l1-title{font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.l1-pills{display:flex;gap:6px;flex-wrap:wrap}
.l1-pill{display:flex;align-items:center;gap:5px;background:#E8F5E9;border:1px solid #A5D6A7;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#1b5e20;cursor:pointer}
.l1-pill a{color:#1b5e20;font-weight:700}
.l1-pill:hover{background:#C8E6C9}

/* ── IC 人数条 ── */
.ic-bar{padding:6px 20px 10px;border-bottom:1px solid #F5F8F5;font-size:12px;color:#888}
.ic-bar span{font-weight:600;color:#555}

/* ── EXPAND BUTTON ── */
.expand-btn{width:100%;background:none;border:none;padding:10px 20px;cursor:pointer;display:flex;align-items:center;justify-between;gap:6px;font-size:12px;color:#888;font-weight:600;text-align:left;border-top:1px solid #F0F5F1;transition:background .15s}
.expand-btn:hover{background:#F4FAF6;color:#2e7d32}
.expand-icon{margin-left:auto;transition:transform .2s;font-size:10px}
.expand-icon.open{transform:rotate(90deg)}

/* ── SUB-DEPT TABLE ── */
.subdept-wrap{display:none;overflow-x:auto;border-top:1px solid #F0F5F1}
.subdept-wrap.open{display:block}
table.st{width:100%;border-collapse:collapse;font-size:12px}
table.st th{padding:6px 12px;text-align:left;color:#aaa;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #EEF3EF;background:#FAFCFA}
table.st td{padding:7px 12px;border-bottom:1px solid #F5F8F5;vertical-align:middle}
table.st tr:last-child td{border-bottom:none}
tr.rv{background:#FFF5F5}
tr.ro{background:#F6FFF6}
.mini-bar{width:80px;height:5px;background:#EEF3EF;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.mini-fill{height:100%;border-radius:3px;background:#4CAF50}
.mini-fill.over{background:#E53935}
.match-tag{font-size:10px;border-radius:4px;padding:1px 6px;font-weight:600}
.mt-exc{background:#E8F5E9;color:#2e7d32}
.mt-mat{background:#E8F4FF;color:#1565c0}
.mt-dbt{background:#FFF3E0;color:#e65100}
.mt-na{background:#F5F5F5;color:#aaa}

/* ── PLACEHOLDER ── */
.placeholder{text-align:center;padding:80px 20px;color:#bbb}
.ph-icon{font-size:48px;margin-bottom:12px}
.ph-text{font-size:15px}
.ph-sub{font-size:13px;color:#ccc;margin-top:6px}

/* ── MODAL ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.moverlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px 32px;max-width:600px;width:92%;box-shadow:0 12px 48px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a1a}
.modal-sub{font-size:12px;color:#aaa;margin-bottom:20px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;margin-top:-4px}
.modal-sec{margin-bottom:18px}
.modal-sec-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #F0F0F0}
.modal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.modal-card{background:#F4FAF6;border-radius:10px;padding:12px 16px}
.modal-card-val{font-size:24px;font-weight:800;color:#1a1a1a}
.modal-card-val.r{color:#c62828}
.modal-card-val.g{color:#2e7d32}
.modal-card-val.b{color:#1565c0}
.modal-card-lbl{font-size:11px;color:#888;margin-top:3px}
.person-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font-size:13px}
.person-row:hover{background:#F4FAF6}
.person-name{font-weight:600;color:#1a1a1a;min-width:100px}
.person-dept{color:#aaa;font-size:12px;flex:1}
.person-date{font-size:11px;color:#bbb;white-space:nowrap}
.badge{font-size:10px;border-radius:4px;padding:1px 6px;font-weight:700}
.badge-l1{background:#1b5e20;color:#fff}
.badge-campus{background:#1565c0;color:#fff}
.badge-social{background:#2e7d32;color:#fff}
.badge-active{background:#e65100;color:#fff}
.badge-passive{background:#c62828;color:#fff}

/* ── DONUT SVG ── */
.donut-wrap{display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid #F5F8F5}
.donut-legend{display:flex;flex-direction:column;gap:3px}
.legend-row{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

@media(max-width:700px){
  .topnav{padding:0 16px}
  .overview-strip{padding:0 12px}
  .tab-panel{padding:12px 16px 32px}
  .dept-grid{grid-template-columns:1fr}
  .alert-bar{margin:10px 16px}
}
</style>
</head>

<div class="moverlay" id="moverlay" onclick="closeMod(event)">

</div>

// ── HELPERS ──────────────────────────────────────────────
const $ = id => document.getElementById(id);
const ce = (tag, cls, html='') => { const el=document.createElement(tag); if(cls) el.className=cls; if(html) el.innerHTML=html; return el; };

function gapPill(g){
  if(g>0) return `<span class="gap-pill v">空编 ${g}</span>`;
  if(g<0) return `<span class="gap-pill o">超编 ${Math.abs(g)}</span>`;
  return `<span class="gap-pill f">满编</span>`;
}

function matchTag(tag){
  const map={'excellent':'mt-exc 优秀','mate':'mt-mat 匹配','in_doubt':'mt-dbt 存疑'};
  const v=map[tag]||'mt-na —'; const [cls,txt]=v.split(' ');
  return `<span class="match-tag ${cls}">${txt}</span>`;
}

function miniBar(cur, tgt){
  const pct = tgt>0 ? Math.min(100, Math.round(cur/tgt*100)) : 100;
  const over = cur > tgt;
  return `<span class="mini-bar"><span class="mini-fill${over?' over':''}" style="width:${pct}%"></span></span> <span style="font-size:10px;color:#aaa;margin-left:4px">${pct}%</span>`;
}

function donut(cur, tgt, r=28){
  const pct = tgt>0 ? Math.min(1, cur/tgt) : 1;
  const circ = 2*Math.PI*r;
  const dash = pct*circ;
  const over = cur > tgt;
  const color = over ? '#E53935' : '#4CAF50';
  const size = (r+6)*2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${r+6}" cy="${r+6}" r="${r}" fill="none" stroke="#EEF3EF" stroke-width="5"/>
    <circle cx="${r+6}" cy="${r+6}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${r+6} ${r+6})"/>
    <text x="${r+6}" y="${r+6}" text-anchor="middle" dominant-baseline="middle"
      font-size="11" font-weight="700" fill="#1a1a1a">${cur}/${tgt}</text>
  </svg>`;
}

// ── SWITCH TAB ────────────────────────────────────────────
function switchTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  $('tab-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ── EXPAND SUBDEPT ────────────────────────────────────────
function toggleSub(cardId){
  const wrap = $('sub-'+cardId);
  const icon = $('icon-'+cardId);
  const btn  = $('btn-'+cardId);
  const open = wrap.classList.toggle('open');
  icon.classList.toggle('open', open);
  btn.textContent = (open ? '▲ 收起子组' : '▼ 展开子组明细') + ' ';
  btn.appendChild(icon);
}

function openMod(title, sub, bodyHtml){
  $('mod-title').textContent = title;
  $('mod-sub').textContent = sub || '';
  $('mod-body').innerHTML = bodyHtml;
  $('moverlay').classList.add('open');
}
function closeMod(e){
  if(!e || e.target===$('moverlay')) $('moverlay').classList.remove('open');
}

function buildCard(deptData, entryList, dimList){
  const id = 'card'+(++cardIdx);

  const g = (top.totalHc||0) - (top.predictHc||0);

  const l1List = entryList.filter(e=>e.manageLevel==='L1');
  const icCount = entryList.filter(e=>e.manageLevel!=='L1').length;
  const dimActive = dimList.filter(e=>(e.dimissionTypeName||'').includes('主动'));
  const dimPassive = dimList.filter(e=>(e.dimissionTypeName||'').includes('被动'));

  // sub dept rows
  const subRows = children.map(c=>{
    const cg = (c.totalHc||0)-(c.predictHc||0);
    const rowCls = cg>=3?'rv':cg<=-4?'ro':'';
    return `<tr class="${rowCls}">
      <td style="font-weight:600">${c.departmentName}</td>
      <td style="text-align:center">${c.currentHc}</td>
      <td style="text-align:center">${c.totalHc}</td>
      <td style="text-align:center">${gapPill(cg)}</td>
      <td>${miniBar(c.currentHc,c.totalHc)}</td>
      <td style="text-align:center">${c.transInHc>0?`<span style="color:#1976d2;font-weight:700">+${c.transInHc}</span>`:'-'}</td>
      <td style="text-align:center">${c.transOutHc>0?`<span style="color:#c62828;font-weight:700">-${c.transOutHc}</span>`:'-'}</td>
      <td>${matchTag(c.matchingDegreeTag)}</td>
    </tr>`;
  }).join('');

  // L1 pills
  const l1Html = l1List.length>0 ? `
    <div class="dept-l1">
      <div class="l1-title">⭐ L1 待入职</div>
      <div class="l1-pills">${l1List.map(p=>`
        <div class="l1-pill" onclick="openPersonMod(${JSON.stringify(p).replace(/"/g,'&quot;')})">
          <span>👤 ${p.showName}</span>
          <span style="font-size:10px;color:#388e3c">${p.departmentName}</span>
          <span style="font-size:10px;color:#81c784">${p.entryDate}</span>
        </div>`).join('')}
      </div>
    </div>` : '';

  return `<div class="dept-card">
    <div class="dept-head">
      <div class="dept-head-row">
        <span class="dept-name">${top.departmentName||''}</span>
        <span class="dept-lv">${top.managerLevelName||''}</span>
        ${gapPill(g)}
        <span class="dept-leader">👤 ${top.leaderName||''}</span>
      </div>
    </div>

    <div class="dept-metrics">
      <div class="metric"><div class="metric-val">${top.currentHc||0}</div><div class="metric-lbl">在职</div></div>
      <div class="metric"><div class="metric-val">${top.totalHc||0}</div><div class="metric-lbl">目标HC</div></div>
      <div class="metric"><div class="metric-val">${top.predictHc||0}</div><div class="metric-lbl">预计在职</div></div>
      <div class="metric"><div class="metric-val in">+${top.transInHc||0}</div><div class="metric-lbl">流入</div></div>
      <div class="metric"><div class="metric-val out">-${top.transOutHc||0}</div><div class="metric-lbl">流出</div></div>
      <div class="metric">
        <div class="metric-val ${g>0?'gap-r':g<0?'gap-g':''}">${g>0?'+'+g:g}</div>
        <div class="metric-lbl">HC Gap</div>
      </div>
    </div>

    <div class="donut-wrap">
      ${donut(top.currentHc||0, top.totalHc||0)}
      <div class="donut-legend">
        <div class="legend-row"><span class="legend-dot" style="background:#4CAF50"></span>在职 ${top.currentHc}</div>
        <div class="legend-row"><span class="legend-dot" style="background:#EEF3EF;border:1px solid #ccc"></span>目标 ${top.totalHc}</div>
        ${g!==0?`<div class="legend-row"><span class="legend-dot" style="background:${g>0?'#E53935':'#2e7d32'}"></span>${g>0?'空编'+g:'超编'+Math.abs(g)}</div>`:''}
      </div>
    </div>

    <div class="dept-flow">
      <div class="flow-block">
        <div class="flow-title">📥 流入在途</div>
        <div class="flow-row"><span class="flow-key">社招待入职</span><span class="flow-num blue">${social.length}</span></div>
        <div class="flow-row"><span class="flow-key">校招待入职</span><span class="flow-num blue">${campus.length}</span></div>
        <div class="flow-row"><span class="flow-key">内部转入</span><span class="flow-num gray">0</span></div>
      </div>
      <div class="flow-block">
        <div class="flow-title">📤 流出在途</div>
        <div class="flow-row"><span class="flow-key">主动离职</span><span class="flow-num red">${dimActive.length}</span></div>
        <div class="flow-row"><span class="flow-key">被动离职</span><span class="flow-num red">${dimPassive.length}</span></div>
        <div class="flow-row"><span class="flow-key">内部转出</span><span class="flow-num gray">0</span></div>
      </div>
    </div>

    ${l1Html}

    ${icCount>0?`<div class="ic-bar">IC 待入职：<span>${icCount} 人</span>（含校招 ${campus.filter(e=>e.manageLevel!=='L1').length} 人），
      <a href="#" onclick="openICMod(${JSON.stringify(entryList.filter(e=>e.manageLevel!=='L1')).replace(/"/g,'&quot;')},this);return false">查看名单</a>

    ${dimList.length>0?`<div class="ic-bar" style="border-top:1px solid #F5F8F5">待离职：<span>${dimList.length} 人</span>，
      <a href="#" onclick="openDimMod(${JSON.stringify(dimList).replace(/"/g,'&quot;')});return false">查看名单</a>
    </div>`:''}

    ${children.length>0?`
    <button class="expand-btn" id="btn-${id}" onclick="toggleSub('${id}')">
      <span>▼ 展开 ${children.length} 个子组明细</span>
      <span class="expand-icon" id="icon-${id}">▶</span>
    </button>
    <div class="subdept-wrap" id="sub-${id}">
      <table class="st">
        <thead><tr>
          <th>子组</th><th>在职</th><th>目标</th><th>Gap</th><th>完成率</th>
          <th>流入</th><th>流出</th><th>匹配度</th>
        </tr></thead>
        <tbody>${subRows}</tbody>
      </table>
    </div>`:''}
  </div>`;
}

        {cls:'biz',label:'商业化',val:bs.gap},
        {cls:'ecom',label:'电商',val:0},
        {cls:'func',label:'职能',val:fs1.gap+fs2.gap},
      ],
      onClick:()=>openMod('HC Gap 明细','正数=空编，负数=超编',buildGapModal(bs.gap,0,fs1.gap+fs2.gap))
    },
    {
      label:'在招职位', total:(D.recruit.allPositionCount||0), colorClass:'',
      segs:[{cls:'biz',label:'候选人',val:(D.recruit.allPositionProcessCount||0)}],
      onClick:()=>openMod('招聘统计','','<div class="modal-grid"><div class="modal-card"><div class="modal-card-val b">'+(D.recruit.allPositionCount||0)+'</div><div class="modal-card-lbl">在招职位</div></div><div class="modal-card"><div class="modal-card-val">'+(D.recruit.allPositionProcessCount||0)+'</div><div class="modal-card-lbl">在途候选人</div></div></div>')
    },
  ];

  const row = $('overviewRow');
  cards.forEach(c=>{
    const el = ce('div','ov-card');
    el.innerHTML = `<div class="ov-label">${c.label}</div>
      <div class="ov-total ${c.colorClass}">${c.total}</div>
      <div class="ov-breakdown">${c.segs.map(s=>`<span class="ov-seg ${s.cls}">${s.label} ${s.val}</span>`).join('')}</div>`;
    el.onclick = c.onClick;
    row.appendChild(el);
  });
}

function buildBizFuncGrid(biz,ecom,func){
  return `<div class="modal-grid">
    <div class="modal-card"><div class="modal-card-val g">${biz}</div><div class="modal-card-lbl">💼 商业化</div></div>
    <div class="modal-card"><div class="modal-card-val b">${ecom}</div><div class="modal-card-lbl">🛒 电商</div></div>
    <div class="modal-card"><div class="modal-card-val" style="color:#e65100">${func}</div><div class="modal-card-lbl">🏛️ 职能</div></div>
  </div>`;
}

function buildGapModal(biz,ecom,func){
  const fmt=v=>`<span style="color:${v>0?'#c62828':v<0?'#2e7d32':'#888'};font-weight:800">${v>0?'+'+v:v}</span>`;
  return `<div class="modal-grid">
    <div class="modal-card"><div class="modal-card-val">${fmt(biz)}</div><div class="modal-card-lbl">💼 商业化</div></div>
    <div class="modal-card"><div class="modal-card-val">${fmt(ecom)}</div><div class="modal-card-lbl">🛒 电商</div></div>
    <div class="modal-card"><div class="modal-card-val">${fmt(func)}</div><div class="modal-card-lbl">🏛️ 职能</div></div>
  </div><p style="font-size:12px;color:#aaa;margin-top:8px">正数=空编（缺人），负数=超编</p>`;
}

function openEntryMod(){
  const all = [...D.biz.entry, ...D.func1.entry];
  const rows = all.map(p=>{
    const isCampus=(p.empTagList||[]).includes('2'), isL1=p.manageLevel==='L1';
    return `<div class="person-row">
      ${isL1?`<a href="https://hr.xiaohongshu.com/next/employee/${p.employeeId}" target="_blank" class="person-name" style="color:#1b5e20">${p.showName}</a>`:`<span class="person-name">${p.showName}</span>`}
      ${isL1?'<span class="badge badge-l1">L1</span>':''}
      ${isCampus?'<span class="badge badge-campus">校招</span>':'<span class="badge badge-social">社招</span>'}
      <span class="person-dept">${p.departmentName}</span>
      <span class="person-date">${p.entryDate}</span>
    </div>`;
  }).join('');
  openMod('全部待入职', `共 ${all.length} 人（L1 可点击查看档案）`, rows);
}

function openDimAllMod(){
  const all = [...D.biz.dimission, ...D.func1.dimission];
  const rows = all.map(p=>{
    const isActive=(p.dimissionTypeName||'').includes('主动');
    return `<div class="person-row">
      <span class="person-name">${p.showName}</span>
      <span class="badge badge-${isActive?'active':'passive'}">${p.dimissionTypeName||'离职'}</span>
      <span class="person-dept">${p.departmentName}</span>
      <span class="person-date">最后：${p.lastDate}</span>
    </div>`;
  }).join('');
  openMod('全部待离职', `共 ${all.length} 人`, rows);
}

// ── ALERT BAR ─────────────────────────────────────────────
function buildAlerts(){
  const alerts = D.allAlerts;
  if(!alerts||alerts.length===0) return;
  $('alertBar').classList.remove('hidden');
  const tags = $('alertTags');
  alerts.forEach(a=>{
    const el=ce('span',`alert-tag ${a.type}`);
    el.textContent = a.type==='vacancy'?`${a.name} 空编${a.gap}`:`${a.name} 超编${Math.abs(a.gap)}`;
    tags.appendChild(el);
  });
}

// ── BUILD ALL ─────────────────────────────────────────────
function buildAll(){
  $('fetchTimeLabel').textContent = '更新：' + D.fetchTime;

  buildOverview();
  buildAlerts();

  // 商业化（行业一部）
  const bizGrid = $('biz-grid');
  bizGrid.innerHTML = buildCard(D.biz, D.biz.entry, D.biz.dimission);

  // 职能（财务一组 + 资本市场）
  const funcGrid = $('func-grid');
  funcGrid.innerHTML =
    buildCard(D.func1, D.func1.entry, D.func1.dimission) +
    buildCard(D.func2, [], []);
}

buildAll();
</script>
</body>
</html>
