<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组织管理看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#F1F4F2;color:#1a1a1a;font-size:14px;line-height:1.5}

/* ── NAV ── */
.nav{background:linear-gradient(135deg,#0f3d24 0%,#1a6035 55%,#135430 100%);padding:0 36px;display:flex;align-items:stretch;position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(0,0,0,.28)}
.nav-left{display:flex;align-items:center;gap:0;padding:15px 0;margin-right:28px;border-right:1px solid rgba(255,255,255,.1);padding-right:28px}
.nav-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:.1px}
.nav-sub{font-size:11px;color:rgba(255,255,255,.4);margin-left:10px;margin-top:3px}
.nav-tabs{display:flex;align-items:stretch;margin-left:4px}
.nav-tab{background:none;border:none;padding:0 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
.nav-tab:hover{color:rgba(255,255,255,.9)}
.nav-tab.active{color:#fff;border-bottom-color:#4ade80;font-weight:700}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.4)}
.pulse{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.tab-panel{display:none;padding:28px 36px 72px;max-width:1400px;margin:0 auto}
.tab-panel.active{display:block}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:24px}
.sh:first-child{margin-top:0}
.sh-title{font-size:13px;font-weight:800;color:#1a1a1a;letter-spacing:.3px;text-transform:uppercase}
.sh-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px}
.sh-tag.green{background:#DCFCE7;color:#166534}
.sh-tag.blue{background:#DBEAFE;color:#1e40af}
.sh-tag.orange{background:#FEF3C7;color:#92400e}
.sh-tag.gray{background:#F3F4F6;color:#6b7280}
.sh-note{font-size:11px;color:#bbb;margin-left:auto}

/* ════════════════════════════
   OVERVIEW — 总览区
════════════════════════════ */
.overview{display:grid;grid-template-columns:auto 1fr;gap:20px;margin-bottom:28px;align-items:start}

/* 大环形图 */
.big-donut-wrap{background:#fff;border-radius:16px;border:1px solid #E5EAE7;padding:24px 28px;box-shadow:0 2px 12px rgba(15,61,36,.07);display:flex;flex-direction:column;align-items:center;min-width:220px}
.big-donut-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.4px;margin-bottom:14px;text-align:center}
.big-donut-canvas{position:relative;width:160px;height:160px}
.big-donut-canvas canvas{position:absolute;top:0;left:0}
.big-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.big-pct{font-size:32px;font-weight:900;line-height:1}
.big-pct.g{color:#16a34a}.big-pct.r{color:#dc2626}.big-pct.y{color:#d97706}
.big-sub{font-size:11px;color:#aaa;margin-top:2px}
.big-donut-stats{display:flex;gap:20px;margin-top:16px;justify-content:center}
.bds{text-align:center}
.bds-val{font-size:18px;font-weight:800;color:#1a1a1a;line-height:1}
.bds-val.b{color:#1d4ed8}.bds-val.g{color:#16a34a}.bds-val.r{color:#dc2626}
.bds-lbl{font-size:9px;color:#aaa;letter-spacing:.3px;margin-top:2px}

/* KPI 网格 */
.kpi-section{margin-bottom:20px}
.kpi-section-title{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:6px}
.kpi-section-title::after{content:'';flex:1;height:1px;background:#E5EAE7}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi-card{background:#fff;border-radius:14px;border:1px solid #E5EAE7;padding:18px 20px;box-shadow:0 1px 6px rgba(15,61,36,.05);display:flex;flex-direction:column;justify-content:space-between}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between}
.kpi-val{font-size:36px;font-weight:900;line-height:1;color:#1a1a1a}
.kpi-val.g{color:#16a34a}.kpi-val.r{color:#dc2626}.kpi-val.b{color:#1d4ed8}
.kpi-icon{font-size:22px;opacity:.6}
.kpi-lbl{font-size:11px;font-weight:700;color:#888;letter-spacing:.3px;margin-top:8px}
.kpi-sub{font-size:11px;color:#aaa;margin-top:4px}
.kpi-trend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;font-weight:700}
.trend-up{color:#16a34a}.trend-dn{color:#dc2626}

/* ════════════════════════════
   DEPT GAP OVERVIEW (横向条)
════════════════════════════ */
.gap-overview{background:#fff;border-radius:14px;border:1px solid #E5EAE7;overflow:hidden;box-shadow:0 1px 6px rgba(15,61,36,.05);margin-bottom:28px}
.gap-ov-hd{padding:14px 20px;border-bottom:1px solid #F0F5F1;display:flex;align-items:center;gap:10px}
.gap-ov-title{font-size:12px;font-weight:700;color:#1a1a1a}
.gap-ov-legend{display:flex;gap:14px;margin-left:auto;font-size:10px;color:#aaa}
.gap-ov-legend span{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:2px;display:inline-block}

.dept-bar-list{padding:10px 0}
.dept-bar-row{display:flex;align-items:center;gap:12px;padding:6px 20px;cursor:pointer;transition:background .1s}
.dept-bar-row:hover{background:#FAFDF9}
.dept-bar-name{width:120px;font-size:12px;font-weight:600;color:#1a1a1a;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dept-bar-name.warn{color:#dc2626}
.dept-bar-track{flex:1;height:10px;background:#F0F5F1;border-radius:6px;overflow:visible;position:relative}
.dept-bar-fill{height:100%;border-radius:6px;transition:width .4s ease;position:relative}
.dept-bar-plan-mark{position:absolute;top:-3px;width:2px;height:16px;background:#9CA3AF;border-radius:1px;transform:translateX(-50%)}
.dept-bar-nums{width:110px;flex-shrink:0;display:flex;align-items:center;gap:6px;justify-content:flex-end;font-size:11px}
.dept-bar-cur{font-weight:700;color:#1a1a1a}
.dept-bar-sep{color:#ddd}
.dept-bar-plan{color:#aaa}
.dept-bar-gap{width:60px;flex-shrink:0;text-align:right}
.gbadge{display:inline-block;font-size:10px;font-weight:700;border-radius:8px;padding:1px 7px}
.gbadge.o{background:#DCFCE7;color:#166534;border:1px solid #86efac}
.gbadge.v{background:#FEE2E2;color:#991b1b;border:1px solid #fca5a5}
.gbadge.f{background:#F9FAFB;color:#6b7280;border:1px solid #e5e7eb}

/* ════════════════════════════
   DEPT CARDS (折叠)
════════════════════════════ */
.dept-cards{display:flex;flex-direction:column;gap:10px}
.dc{background:#fff;border-radius:14px;border:1px solid #E5EAE7;overflow:hidden;box-shadow:0 1px 6px rgba(15,61,36,.05);transition:box-shadow .15s}
.dc:hover{box-shadow:0 4px 16px rgba(15,61,36,.1)}

.dc-hd{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.dc-hd:hover{background:#FAFDF9}
.dc-hd-left{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dc-name{font-size:14px;font-weight:700;color:#1a1a1a}
.dc-leader{font-size:11px;color:#aaa}
.dc-hd-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.dc-mini-stats{display:flex;gap:16px}
.dc-ms{text-align:center}
.dc-ms-val{font-size:15px;font-weight:800;line-height:1}
.dc-ms-val.b{color:#1d4ed8}.dc-ms-val.g{color:#16a34a}.dc-ms-val.r{color:#dc2626}
.dc-ms-lbl{font-size:9px;color:#bbb;margin-top:1px}
.dc-pct-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px}
.dc-pct-badge.g{background:#DCFCE7;color:#166534}
.dc-pct-badge.y{background:#FEF3C7;color:#92400e}
.dc-pct-badge.r{background:#FEE2E2;color:#991b1b}
.arr{font-size:11px;color:#ccc;transition:transform .2s}
.arr.open{transform:rotate(90deg)}

.dc-body{display:none;border-top:1px solid #F0F5F1}
.dc-body.open{display:block}

/* metrics row */
.dc-metrics{display:flex;padding:12px 20px;gap:0;border-bottom:1px solid #F5F8F5;flex-wrap:wrap}
.dc-m{flex:1;min-width:70px;text-align:center;padding:4px 0;border-right:1px solid #F5F8F5}
.dc-m:last-child{border-right:none}
.dc-m-val{font-size:16px;font-weight:800;line-height:1}
.dc-m-val.b{color:#1d4ed8}.dc-m-val.g{color:#16a34a}.dc-m-val.r{color:#dc2626}.dc-m-val.dim{color:#9CA3AF}
.dc-m-lbl{font-size:9px;color:#bbb;margin-top:2px}

/* chart */
.dc-chart{padding:14px 20px;border-bottom:1px solid #F5F8F5}
.dc-chart canvas{max-height:130px}

/* flow section */
.dc-flow{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 20px;border-bottom:1px solid #F5F8F5}
.flow-blk{background:#F9FBFA;border-radius:10px;padding:10px 14px}
.flow-blk-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.flow-count{font-size:11px;font-weight:700;padding:1px 6px;border-radius:6px}
.flow-count.in{background:#DBEAFE;color:#1e40af}
.flow-count.out{background:#FEE2E2;color:#991b1b}
.flow-person{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #EEF3EF}
.flow-person:last-child{border-bottom:none}
.flow-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.flow-av.in{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.flow-av.out{background:linear-gradient(135deg,#dc2626,#f87171)}
.flow-info{flex:1;min-width:0}
.flow-nm{font-size:12px;font-weight:600;color:#1a1a1a}
.flow-dept{font-size:10px;color:#aaa}
.flow-right{text-align:right;flex-shrink:0}
.flow-date{font-size:10px;color:#888;font-weight:600}
.lv-tag{display:inline-block;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:3px}
.lv-l1{background:#14532d;color:#fff}
.lv-l2{background:#3b0764;color:#fff}
.flow-empty{font-size:11px;color:#ccc;padding:8px 0}
.ic-note{font-size:10px;color:#bbb;margin-top:6px;padding-top:6px;border-top:1px solid #F0F5F1}

/* subdept table */
.dc-sub{overflow-x:auto}
table.sdt{width:100%;border-collapse:collapse;font-size:12px}
table.sdt th{padding:7px 14px;font-size:10px;font-weight:700;color:#aaa;text-align:center;border-bottom:1px solid #EEF3EF;background:#FAFCFA;white-space:nowrap}
table.sdt th.l{text-align:left}
table.sdt td{padding:8px 14px;border-bottom:1px solid #F5F8F5;text-align:center;vertical-align:middle}
table.sdt td.l{text-align:left;font-weight:600}
table.sdt tr:last-child td{border-bottom:none}
table.sdt tr.ov{background:#F0FDF4}
table.sdt tr.un{background:#FEF2F2}
.mini-bar{width:52px;height:4px;background:#EEF3EF;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:3px}
.mini-fill{height:100%;border-radius:3px;background:#4ade80}
.mini-fill.ov{background:#ef4444}
.mini-fill.warn{background:#f59e0b}
.mt{font-size:10px;border-radius:3px;padding:1px 5px;font-weight:600}
.mt-exc{background:#DCFCE7;color:#166534}
.mt-mat{background:#DBEAFE;color:#1e40af}
.mt-na{background:#F9FAFB;color:#9CA3AF}

/* ════════════════════════════
   ALERT BARS
════════════════════════════ */
.alert-wrap{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.alert-strip{border-radius:10px;padding:10px 16px;display:flex;align-items:flex-start;gap:10px}
.alert-strip.hidden{display:none}
.alert-strip.urgent{background:#FEF2F2;border:1px solid #fca5a5}
.alert-strip.notice{background:#FFFBEB;border:1px solid #FDE68A}
.alert-icon{font-size:14px;margin-top:1px;flex-shrink:0}
.alert-label{font-size:11px;font-weight:800;margin-right:6px;white-space:nowrap}
.alert-label.urgent{color:#991b1b}
.alert-label.notice{color:#92400e}
.alert-body{display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.alert-tags{display:flex;flex-wrap:wrap;gap:5px}
.at{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600}
.at.over{background:#DCFCE7;color:#166534;border:1px solid #86efac}
.at.under{background:#FEE2E2;color:#991b1b;border:1px solid #fca5a5}

@media(max-width:900px){
  .overview{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .dc-flow{grid-template-columns:1fr}
  .tab-panel{padding:16px 16px 48px}
  .nav{padding:0 16px}
}
</style>
</head>

      <div class="nav-title">组织管理看板</div>

  </div>
</nav>

<div id="tab-biz" class="tab-panel active">

  <!-- DEPT GAP OVERVIEW -->
  <div class="sh"><span class="sh-title">各部门 HC 完成度</span><span class="sh-tag gray">在职 ÷ Y26规划</span><span class="sh-note">灰线 = 规划基准</span></div>
  <div class="gap-overview">
    <div class="gap-ov-hd">
      <span class="gap-ov-title">部门满编率总览</span>
      <div class="gap-ov-legend">
        <span><span class="leg-dot" style="background:#4ade80"></span>在职</span>
        <span><span class="leg-dot" style="background:#93c5fd"></span>预计在职</span>

      </div>
    </div>
    <div class="dept-bar-list" id="deptBarList"></div>
  </div>

  <!-- DEPT CARDS -->
  <div class="sh"><span class="sh-title">各部门详情</span><span class="sh-tag gray">点击展开子组 · 仅展示L1/L2关键人选</span></div>
  <div class="dept-cards" id="bizCards"></div>
</div>

<!-- ══════ 电商 TAB ══════ -->
<div id="tab-ecom" class="tab-panel">
  <div class="sh"><span class="sh-title">交易（电商）HC</span><span class="sh-tag green">Y26规划 347</span></div>
  <div class="gap-overview">
    <div class="gap-ov-hd"><span class="gap-ov-title">部门满编率总览</span></div>
    <div class="dept-bar-list" id="ecomBarList"></div>
  </div>
  <div class="sh"><span class="sh-title">各部门详情</span></div>
  <div class="dept-cards" id="ecomCards"></div>
</div>

<!-- ══════ 职能 TAB ══════ -->
<div id="tab-func" class="tab-panel">
  <div class="sh"><span class="sh-title">职能 HC</span><span class="sh-tag green">Y26规划 272 · 战略 72</span></div>
  <div class="gap-overview">
    <div class="gap-ov-hd"><span class="gap-ov-title">部门满编率总览</span></div>
    <div class="dept-bar-list" id="funcBarList"></div>
  </div>
  <div class="sh"><span class="sh-title">各部门详情</span></div>
  <div class="dept-cards" id="funcCards"></div>
</div>

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
const _charts = {};
let _dcCount = 0;
function fmtD(s){return s?(s+'').replace(/^(\d{4})-(\d{2})-(\d{2})$/,'$2/$3'):''}
function initials(s){return ((s||'').replace(/[（(].*$/,'').trim()).slice(0,2)||'?'}
function pctCls(cur,plan){const p=cur/plan;return p>=1?'g':p>=0.85?'':p>=0.7?'y':'r'}
function gBadge(g){
  if(g>0) return '<span class="gbadge o">超'+g+'</span>';
  if(g<0) return '<span class="gbadge v">缺'+Math.abs(g)+'</span>';
  return '<span class="gbadge f">达标</span>';
}
function lvTag(lv){
  if(lv==='L1') return '<span class="lv-tag lv-l1">L1</span>';
  if(lv==='L2') return '<span class="lv-tag lv-l2">L2</span>';
  return '';
}
function mtTag(m){
  if(!m) return '<span class="mt mt-na">—</span>';
  if(m==="优秀") return '<span class="mt mt-exc">优秀</span>';
  return '<span class="mt mt-mat">'+m+'</span>';
}

// ════════════════════════════════════════════
// TOTALS
// ════════════════════════════════════════════
function totals(depts){
  return depts.reduce((a,d)=>({
    cur:a.cur+d.cur, plan:a.plan+d.plan, predict:a.predict+d.predict,
    inHc:a.inHc+d.inHc, outHc:a.outHc+d.outHc
  }),{cur:0,plan:0,predict:0,inHc:0,outHc:0});
}

// ════════════════════════════════════════════
// BIG DONUT
// ════════════════════════════════════════════
function renderBigDonut(canvasId, cur, plan, predict){
  const pct = Math.round(cur/plan*100);
  const cls = pct>=100?'g':pct>=85?'':pct>=70?'y':'r';
  document.getElementById('bigPct').textContent = pct+'%';
  document.getElementById('bigPct').className = 'big-pct '+cls;
  document.getElementById('bigSub').textContent = cur+' / '+plan;
  const g = predict - plan;
  document.getElementById('bigStats').innerHTML =
    '<div class="bds"><div class="bds-val b">'+predict+'</div><div class="bds-lbl">预计在职</div></div>'
    +'<div class="bds"><div class="bds-val '+(g>=0?'g':'r')+'">'+(g>=0?'超':'缺')+Math.abs(g)+'</div><div class="bds-lbl">HC Gap</div></div>';
  const fill = Math.min(cur/plan,1.15);
  const color = pct>=100?'#4ade80':pct>=85?'#86efac':pct>=70?'#fbbf24':'#f87171';
  if(_charts[canvasId]) _charts[canvasId].destroy();
  _charts[canvasId]=new Chart(document.getElementById(canvasId),{
    type:'doughnut',
    data:{datasets:[{
      data:[Math.min(fill,1),Math.max(1-fill,0)],
      backgroundColor:[color,'#E5EAE7'],borderWidth:0,hoverOffset:0
    }]},
    options:{cutout:'75%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:800},events:[]}
  });
}

// ════════════════════════════════════════════
// KPI GRID
// ════════════════════════════════════════════
function renderKpis(containerId, depts){
  const t=totals(depts);
  const pct=Math.round(t.cur/t.plan*100);
  const warns=depts.filter(d=>d.isWarn||d.cur<d.plan*0.85);
  const overDepts=depts.filter(d=>d.cur>d.plan);
  // 统计L1/L2流入流出
  const allEntry=depts.flatMap(d=>d.entry||[]);
  const allDim=depts.flatMap(d=>d.dimission||[]);
  const keyIn=allEntry.filter(e=>e.lv==='L1'||e.lv==='L2');
  const keyOut=allDim.filter(e=>e.lv==='L1'||e.lv==='L2');
  const dimOut=allDim.filter(e=>e.type==='主动'||e.type==='被动');
  const transOut=allDim.filter(e=>e.type==='转岗');

  const sections=[
    {
      title:'HC 数据',
      items:[
        {v:t.cur, lbl:'在职人数', sub:'Y26规划 '+t.plan+' 人', cls:'b', icon:'👥'},
        {v:pct+'%', lbl:'整体满编率', sub:t.cur+' / '+t.plan, cls:pct>=100?'g':pct>=85?'':'r', icon:'📊'},
        {v:t.predict, lbl:'预计在职', sub:'预计缺/超 '+(t.predict>=t.plan?'超'+(t.predict-t.plan):'缺'+(t.plan-t.predict))+'人', cls:'', icon:'🎯'},
      ]
    },
    {
      title:'流动数据',
      items:[
        {v:'+'+keyIn.length, lbl:'L1/L2 流入在途', sub:'IC另有 '+(allEntry.length-keyIn.length)+' 人待入职', cls:'b', icon:'↗️'},
        {v:'-'+keyOut.length, lbl:'L1/L2 流出在途', sub:'离职 '+dimOut.filter(e=>e.lv==='L1'||e.lv==='L2').length+' · 转岗 '+transOut.filter(e=>e.lv==='L1'||e.lv==='L2').length, cls:keyOut.length?'r':'', icon:'↘️'},
        {v:transOut.length+'', lbl:'转岗在途', sub:transOut.map(e=>e.name).join('·')||'暂无', cls:transOut.length?'':'', icon:'🔄'},
      ]
    },
    {
      title:'建议关注',
      items:[
        {v:warns.length+'', lbl:'低满编部门', sub:warns.slice(0,2).map(d=>d.name).join('·')+(warns.length>2?'等':''), cls:warns.length?'r':'g', icon:'⚠️'},
        {v:overDepts.length+'', lbl:'超编部门', sub:overDepts.slice(0,2).map(d=>d.name).join('·')||'暂无', cls:'', icon:'📈'},
        {v:dimOut.length+'', lbl:'离职在途', sub:dimOut.map(e=>(e.lv==='L1'||e.lv==='L2'?'★':'')+e.name).join('·').slice(0,28)||'暂无', cls:dimOut.length?'r':'', icon:'🚪'},
      ]
    }
  ];
  const el=document.getElementById(containerId);
  el.innerHTML=sections.map(sec=>`
    <div class="kpi-section">
      <div class="kpi-section-title">${sec.title}</div>
      <div class="kpi-grid">
        ${sec.items.map(it=>`
        <div class="kpi-card">
          <div class="kpi-top">
            <div class="kpi-val ${it.cls||''}">${it.v}</div>
            <div class="kpi-icon">${it.icon}</div>
          </div>
          <div class="kpi-lbl">${it.lbl}</div>
          <div class="kpi-sub">${it.sub}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
// ALERT STRIP
// ════════════════════════════════════════════
function renderAlerts(urgentId, urgentTagId, noticeId, noticeTagId, depts){
  // 立即关注：满编率<70% 或 isWarn
  const urgent=depts.filter(d=>d.cur<d.plan*0.70||d.isWarn);
  // 建议追进：满编率70~85%，或有L1/L2流出
  const allDim=depts.flatMap(d=>d.dimission||[]);
  const keyOutDepts=depts.filter(d=>(d.dimission||[]).some(e=>e.lv==='L1'||e.lv==='L2'));
  const notice=depts.filter(d=>!urgent.includes(d)&&(d.cur/d.plan<0.85||(d.dimission||[]).some(e=>e.lv==='L1'||e.lv==='L2')));

  const urgentEl=document.getElementById(urgentId);
  const noticeEl=document.getElementById(noticeId);

  if(!urgent.length) urgentEl.classList.add('hidden');
  else {
    let html='';
    urgent.forEach(d=>{
      const pct=Math.round(d.cur/d.plan*100);
      html+='<span class="at under">'+d.name+' '+pct+'%</span>';
    });
    document.getElementById(urgentTagId).innerHTML=html;
  }
  if(!notice.length) noticeEl.classList.add('hidden');
  else {
    let html='';
    notice.forEach(d=>{
      const hasDim=(d.dimission||[]).some(e=>e.lv==='L1'||e.lv==='L2');
      const pct=Math.round(d.cur/d.plan*100);
      const tag=hasDim?d.name+' L1/L2流出':d.name+' '+pct+'%';
      html+='<span class="at '+(hasDim?'under':'under')+'">'+tag+'</span>';
    });
    document.getElementById(noticeTagId).innerHTML=html;
  }
}

// ════════════════════════════════════════════
// DEPT BAR LIST
// ════════════════════════════════════════════
function renderDeptBars(containerId, depts, onClickFn){
  const maxPlan=Math.max(...depts.map(d=>d.plan));
  const el=document.getElementById(containerId);
  // sort by pct asc (缺编的在前)
  const sorted=[...depts].sort((a,b)=>(a.cur/a.plan)-(b.cur/b.plan));
  sorted.forEach(d=>{
    const pct=d.cur/d.plan;
    const predPct=d.predict/d.plan;
    const barW=Math.min(pct*100,120);
    const predW=Math.min(predPct*100,120);
    const planW=100; // plan is always 100%
    const color=pct>=1?'#4ade80':pct>=0.85?'#86efac':pct>=0.7?'#fbbf24':'#f87171';
    const g=d.predict-d.plan;
    const row=document.createElement('div');
    row.className='dept-bar-row';
    row.innerHTML=`
      <div class="dept-bar-name${pct<0.8?' warn':''}">${d.name}</div>
      <div class="dept-bar-track">
        <div class="dept-bar-fill" style="width:${barW}%;background:${color}"></div>
        <div class="dept-bar-plan-mark" style="left:${planW}%"></div>
      </div>
      <div class="dept-bar-nums">
        <span class="dept-bar-cur">${d.cur}</span>
        <span class="dept-bar-sep">/</span>
        <span class="dept-bar-plan">${d.plan}</span>
        <span style="font-size:10px;color:#bbb;font-weight:400">${Math.round(pct*100)}%</span>
      </div>
      <div class="dept-bar-gap">${gBadge(g)}</div>`;
    row.addEventListener('click',()=>onClickFn&&onClickFn(d.name));
    el.appendChild(row);
  });
}

// ════════════════════════════════════════════
// DEPT CARDS

    const keyDim=(d.dimission||[]).filter(e=>e.lv==='L1'||e.lv==='L2');

          <div class="flow-nm">${e.name}${lvTag(e.lv||'')}${e.type==='转岗'?'<span class="lv-tag" style="background:#7c3aed;color:#fff">转岗</span>':e.type==='主动'?'<span class="lv-tag" style="background:#dc2626;color:#fff">主动</span>':e.type==='被动'?'<span class="lv-tag" style="background:#92400e;color:#fff">被动</span>':''}</div>
          <div class="flow-dept">${e.dept}</div>
        </div>
        <div class="flow-right"><div class="flow-date">${fmtD(e.date||e.date)}</div></div>
      </div>`).join('');

    // sub table
    let subHtml='';
    if(d.subs&&d.subs.length){
      const rows=d.subs.map(s=>{
        const sg=(s.pred??s.predictHc??s.cur)-s.plan;
        const spct=s.plan?Math.round((s.pred??s.cur)/s.plan*100):0;
        const ov=sg>0,un=sg<0;
        return `<tr class="${ov?'ov':un?'un':''}">
          <td class="l">${s.n}</td>
          <td>${s.l||'—'}</td>
          <td style="color:#1d4ed8;font-weight:700">${s.cur}</td>
          <td>${s.plan}</td>
          <td style="color:#1976d2">${s.in??0}</td>
          <td style="color:#dc2626">${s.out??0}</td>
          <td style="color:#1d4ed8;font-weight:700">${s.pred??s.cur}</td>
          <td>${gBadge(sg)}</td>
          <td><span class="mini-bar"><span class="mini-fill${s.pred>s.plan?' ov':spct<85?' warn':''}" style="width:${Math.min(spct,100)}%"></span></span><span style="font-size:11px;font-weight:700;color:${s.pred>=s.plan?'#16a34a':'#dc2626'}">${spct}%</span></td>
          ${s.match!==undefined?'<td>'+mtTag(s.match)+'</td>':''}
        </tr>`;
      }).join('');
      subHtml=`<div class="dc-sub"><table class="sdt">
        <thead><tr>
          <th class="l">子组</th><th>负责人</th>
          <th style="color:#1d4ed8">在职</th><th>目标</th>
          <th>流入</th><th>流出</th>
          <th style="color:#1d4ed8">预计</th>
          <th>HC Gap</th><th>满编率</th>
          ${d.subs[0]&&d.subs[0].match!==undefined?'<th>人岗匹配</th>':''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }

    el.innerHTML+=`
    <div class="dc" id="${cid}">
      <div class="dc-hd" onclick="toggleDC('${cid}','${barId}',${di})">
        <div class="dc-hd-left">
          <span class="dc-name">${d.name}</span>
          ${d.leader&&d.leader!=='—'?'<span class="dc-leader">· '+d.leader+'</span>':''}
          ${d.isReal?'<span style="font-size:10px;background:#DBEAFE;color:#1e40af;border-radius:4px;padding:1px 6px;font-weight:700">系统实时</span>':''}
          ${d.isWarn?'<span style="font-size:10px;background:#FEE2E2;color:#991b1b;border-radius:4px;padding:1px 6px;font-weight:700">⚠ 重点关注</span>':''}
        </div>
        <div class="dc-hd-right">
          <div class="dc-mini-stats">
            <div class="dc-ms"><div class="dc-ms-val b">${d.cur}</div><div class="dc-ms-lbl">在职</div></div>
            <div class="dc-ms"><div class="dc-ms-val">${d.plan}</div><div class="dc-ms-lbl">Y26规划</div></div>
            <div class="dc-ms"><div class="dc-ms-val ${g>=0?'g':'r'}">${g>=0?'超':'缺'}${Math.abs(g)}</div><div class="dc-ms-lbl">Gap</div></div>
          </div>
          <span class="dc-pct-badge ${pctCls2}">${pct}%</span>
          <span class="arr" id="arr-${cid}">▶</span>
        </div>
      </div>
      <div class="dc-body" id="body-${cid}">
        <div class="dc-metrics">
          <div class="dc-m"><div class="dc-m-val b">${d.cur}</div><div class="dc-m-lbl">在职</div></div>
          <div class="dc-m"><div class="dc-m-val">${d.plan}</div><div class="dc-m-lbl">Y26规划</div></div>
          <div class="dc-m"><div class="dc-m-val b">${d.predict}</div><div class="dc-m-lbl">预计在职</div></div>
          <div class="dc-m"><div class="dc-m-val" style="color:#1976d2">+${d.inHc}</div><div class="dc-m-lbl">流入在途</div></div>
          <div class="dc-m"><div class="dc-m-val r">-${d.outHc}</div><div class="dc-m-lbl">流出在途</div></div>
          <div class="dc-m"><div class="dc-m-val ${g>=0?'g':'r'}">${g>=0?'超':'缺'}${Math.abs(g)}</div><div class="dc-m-lbl">HC Gap</div></div>
          <div class="dc-m"><div class="dc-m-val ${pctCls2}">${pct}%</div><div class="dc-m-lbl">满编率</div></div>
        </div>
        ${d.subs&&d.subs.length?`<div class="dc-chart"><canvas id="${barId}" height="120"></canvas></div>`:''}
        <div class="dc-flow">
          <div class="flow-blk">
            <div class="flow-blk-title">↗ 关键人选 · 待入职 <span class="flow-count in">${keyEntry.length} L1/L2</span></div>

// ════════════════════════════════════════════
// TOGGLE + CHART
// ════════════════════════════════════════════
function toggleDC(cid, barId, di){
  const body=document.getElementById('body-'+cid);
  const arr=document.getElementById('arr-'+cid);
  const isOpen=body.classList.toggle('open');
  arr.classList.toggle('open',isOpen);
  if(isOpen&&!_charts[barId]){
    // find dept data
    const allDepts=[...DEPTS.biz,...DEPTS.ecom,...DEPTS.func];
    const d=allDepts.find(d=>document.getElementById(cid).querySelector('.dc-name').textContent===d.name);
    if(d&&d.subs&&d.subs.length){
      renderSubChart(barId, d.subs);
    }
  }
}
function renderSubChart(barId, subs){
  const canvas=document.getElementById(barId);
  if(!canvas||!subs.length) return;
  const maxN=18;
  const data=subs.slice(0,maxN);
  const labels=data.map(s=>s.n.replace(/平台专家/g,'专家').replace(/商业化产品/g,'产品').replace(/行业BD/g,'BD'));
  if(_charts[barId]) _charts[barId].destroy();
  _charts[barId]=new Chart(canvas,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'在职',data:data.map(s=>s.cur),backgroundColor:'rgba(74,222,128,.85)',borderRadius:4,order:2},
        {label:'目标',data:data.map(s=>s.plan),backgroundColor:'rgba(147,197,253,.4)',borderRadius:4,order:3},
        {label:'预计在职',data:data.map(s=>s.pred??s.cur),type:'line',
          borderColor:'rgba(29,78,216,.7)',backgroundColor:'transparent',
          pointBackgroundColor:'rgba(29,78,216,.8)',pointRadius:3,tension:.3,borderWidth:2,order:1,
          yAxisID:'y'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{bodyFont:{size:11},titleFont:{size:11}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},
        y:{ticks:{font:{size:9}},beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'}}
      }
    }
  });
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  setTimeout(()=>Object.values(_charts).forEach(c=>c.resize&&c.resize()),30);
}
