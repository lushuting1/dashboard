<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC Dashboard - 动态权限版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#F1F4F2;color:#1a1a1a;font-size:14px;line-height:1.5}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid #E5EAE7;border-top-color:#1a6035;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{background:linear-gradient(135deg,#0f3d24 0%,#1a6035 55%,#135430 100%);padding:0 36px;display:flex;align-items:stretch;position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(0,0,0,.28)}
.nav-title{font-size:20px;font-weight:800;color:#fff;padding:16px 0}
.container{max-width:1440px;margin:0 auto;padding:24px 32px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.alert-strip{padding:12px 16px;border-radius:12px;margin-bottom:16px;background:#FEE2E2;color:#991b1b}
.dept-card{background:#fff;border-radius:16px;border:1px solid #E5EAE7;padding:20px;margin-bottom:16px}
.dept-name{font-size:16px;font-weight:800}
.dept-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:12px}
.stat{text-align:center}
.stat-val{font-size:24px;font-weight:800;color:#1a1a1a}
.stat-lbl{font-size:11px;color:#888}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div>正在根据您的权限加载数据...</div>
  <div style="font-size:12px;color:#888">请确保已登录 hr.xiaohongshu.com</div>
</div>

<nav class="nav">
  <div class="container">
    <div class="nav-title">HC 管理看板 - 动态权限版</div>
  </div>
</nav>

<div class="container">
  <div id="content"></div>
</div>

<script>
const BASE = 'https://hr.xiaohongshu.com/oasis/api/ehrworkbench';

async function fetchWithAuth(url, options = {}) {
  const resp = await fetch(url, { ...options, credentials: 'include' });
  const data = await resp.json();
  return data.code === 200 ? data.data : null;
}

async function loadData() {
  // 1. 获取部门列表
  const deptList = await fetchWithAuth(`${BASE}/hrbp/pc/department/query`);
  if (!deptList || !deptList.hrbpDepartmentVOList) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#dc2626">❌ 无法获取数据</div>
      <div style="font-size:12px;color:#666;margin-top:8px">
        请检查：<br>1. 是否已登录 hr.xiaohongshu.com<br>2. 是否有 HRBP 权限
      </div>
    `;
    return;
  }

  const depts = deptList.hrbpDepartmentVOList;
  const content = document.getElementById('content');
  
  content.innerHTML = `<div style="margin-bottom:12px;font-size:14px;color:#666">✅ 已加载 ${depts.length} 个有权限的部门</div>`;

  // 2. 逐个获取部门详情
  for (const dept of depts.slice(0, 5)) { // 先显示前5个
    const detail = await fetchWithAuth(`${BASE}/hrbp/pc/department/query?departmentId=${dept.departmentId}`);
    if (!detail) continue;

    const entry = await fetchWithAuth(`${BASE}/entry/pc/entryProcessDetail/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({departmentIdList: [dept.departmentId], pageNum: 1, pageSize: 50})
    });
    
    const dimission = await fetchWithAuth(`${BASE}/dimission/pc/dimissionProcessDetail/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({departmentIdList: [dept.departmentId], pageNum: 1, pageSize: 50})
    });

    const cur = detail.currentHc || 0;
    const plan = detail.totalHc || 0;
    const inCount = entry?.entryProcessDetailList?.length || 0;
    const outCount = dimission?.dimissionProcessDetailList?.length || 0;
    const predict = cur + inCount - outCount;

    const card = document.createElement('div');
    card.className = 'dept-card';
    card.innerHTML = `
      <div class="dept-name">${dept.departmentName}</div>
      <div class="dept-stats">
        <div class="stat"><div class="stat-val">${plan}</div><div class="stat-lbl">HC规划</div></div>
        <div class="stat"><div class="stat-val" style="color:#1d4ed8">${cur}</div><div class="stat-lbl">在职</div></div>
        <div class="stat"><div class="stat-val" style="color:#16a34a">+${inCount}</div><div class="stat-lbl">流入</div></div>
        <div class="stat"><div class="stat-val" style="color:${outCount?'#dc2626':'#9ca3af'}">${outCount||'-'}${outCount?'':'人'}</div><div class="stat-lbl">流出</div></div>
      </div>
    `;
    content.appendChild(card);
  }

  document.getElementById('loading').style.display = 'none';
}

// 页面加载后 500ms 开始获取数据
setTimeout(loadData, 500);
</script>

</body>
</html>
