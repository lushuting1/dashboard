<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC 管理看板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif; background: #F4F5F7; color: #111; font-size: 14px; line-height: 1.5; }
  a { color: #1677FF; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .header { background: #fff; border-bottom: 1px solid #EAECF0; padding: 16px 32px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 18px; font-weight: 700; color: #111; }
  .header-sub { font-size: 13px; color: #888; margin-left: auto; }

  /* Overview bar */
  .overview { padding: 20px 32px 0; display: flex; gap: 12px; flex-wrap: wrap; }
  .ov-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 16px 20px; flex: 1; min-width: 130px; cursor: pointer; transition: box-shadow .15s, transform .1s; user-select: none; }
  .ov-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .ov-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .ov-value { font-size: 30px; font-weight: 800; color: #111; }
  .ov-value.red { color: #FF2442; }
  .ov-value.green { color: #00A854; }
  .ov-value.blue { color: #1677FF; }
  .ov-value.orange { color: #FA8C16; }

  /* Warning bar */
  .warning-bar { margin: 16px 32px 0; background: #FFF7E6; border: 1px solid #FFD591; border-radius: 10px; padding: 12px 18px; display: flex; align-items: flex-start; gap: 10px; }
  .warning-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .warning-title { font-weight: 600; font-size: 13px; color: #D46B08; margin-bottom: 4px; }
  .warning-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .warning-tag { font-size: 12px; background: #fff; border: 1px solid #FFD591; border-radius: 6px; padding: 3px 10px; color: #873800; }

  /* Tabs */
  .tabs { margin: 20px 32px 0; display: flex; gap: 0; border-bottom: 2px solid #EAECF0; }
  .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s, border-color .15s; }
  .tab-btn.active { color: #111; border-bottom-color: #FF2442; font-weight: 700; }
  .tab-btn:hover:not(.active) { color: #333; }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .panel-content { padding: 20px 32px 40px; display: flex; flex-direction: column; gap: 20px; }

  /* Dept card */
  .dept-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; }
  .dept-header { padding: 20px 24px 16px; border-bottom: 1px solid #F0F0F0; }
  .dept-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .dept-name { font-size: 18px; font-weight: 700; }
  .dept-level { font-size: 12px; background: #F0F5FF; color: #1677FF; border-radius: 5px; padding: 2px 8px; font-weight: 600; }
  .dept-leader { font-size: 12px; color: #888; }
  .gap-pill { font-size: 12px; font-weight: 700; border-radius: 20px; padding: 3px 12px; }
  .gap-pill.vacancy { background: #FFF1F0; color: #FF2442; border: 1px solid #FFCCC7; }
  .gap-pill.overstaff { background: #F6FFED; color: #00A854; border: 1px solid #B7EB8F; }
  .gap-pill.full { background: #F5F5F5; color: #888; border: 1px solid #D9D9D9; }

  .dept-stats { display: flex; gap: 24px; margin-top: 14px; flex-wrap: wrap; }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 11px; color: #aaa; }
  .stat-value { font-size: 22px; font-weight: 800; color: #111; }
  .stat-value.in { color: #1677FF; }
  .stat-value.out { color: #FF2442; }

  /* Donut chart */
  .dept-body { padding: 16px 24px; }
  .dept-metrics { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .donut-wrap { display: flex; align-items: center; gap: 14px; }
  .donut-legend { display: flex; flex-direction: column; gap: 5px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Flow breakdown */
  .flow-section { display: flex; gap: 20px; flex-wrap: wrap; flex: 1; }
  .flow-block { flex: 1; min-width: 160px; background: #FAFAFA; border-radius: 8px; padding: 12px 14px; }
  .flow-block-title { font-size: 11px; color: #888; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
  .flow-items { display: flex; flex-direction: column; gap: 5px; }
  .flow-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .flow-item-name { color: #555; }
  .flow-item-val { font-weight: 700; }
  .flow-item-val.positive { color: #1677FF; }
  .flow-item-val.negative { color: #FF2442; }
  .flow-item-val.neutral { color: #888; }

  /* Sub-dept toggle */
  .expand-btn { margin: 0 24px 0; padding: 10px 0; border-top: 1px solid #F0F0F0; background: none; border-left: none; border-right: none; border-bottom: none; cursor: pointer; width: calc(100% - 48px); text-align: left; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; font-weight: 500; }
  .expand-btn:hover { color: #333; }
  .expand-icon { transition: transform .2s; display: inline-block; font-size: 10px; }
  .expand-icon.open { transform: rotate(90deg); }

  /* Sub-dept table */
  .subdept-panel { display: none; padding: 0 24px 16px; overflow-x: auto; }
  .subdept-panel.open { display: block; }
  table.subdept-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.subdept-tbl th { text-align: left; padding: 7px 10px; color: #aaa; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid #F0F0F0; }
  table.subdept-tbl td { padding: 8px 10px; border-bottom: 1px solid #F8F8F8; vertical-align: middle; }
  table.subdept-tbl tr:last-child td { border-bottom: none; }
  tr.row-vacancy { background: #FFF5F5; }
  tr.row-overstaff { background: #F6FFED; }
  .match-tag { font-size: 11px; border-radius: 4px; padding: 2px 7px; font-weight: 600; }
  .match-excellent { background: #E6F4EA; color: #00A854; }
  .match-mate { background: #E8F4FF; color: #1677FF; }
  .match-doubt { background: #FFF7E6; color: #FA8C16; }
  .match-na { background: #F5F5F5; color: #888; }

  /* Mini bar chart */
  .mini-bar-wrap { display: flex; align-items: center; gap: 6px; width: 120px; }
  .mini-bar-bg { flex: 1; height: 6px; background: #EAECF0; border-radius: 3px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 3px; }
  .mini-bar-pct { font-size: 11px; color: #888; min-width: 32px; text-align: right; }

  /* People list */
  .people-section { padding: 0 24px 16px; display: flex; gap: 16px; flex-wrap: wrap; }
  .people-block { flex: 1; min-width: 240px; }
  .people-block-title { font-size: 12px; font-weight: 700; color: #aaa; margin-bottom: 8px; letter-spacing: .3px; }
  .people-list { display: flex; flex-direction: column; gap: 4px; }
  .person-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 8px; border-radius: 6px; }
  .person-row:hover { background: #F5F5F5; }
  .person-name a { color: #111; font-weight: 500; }
  .person-name a:hover { color: #1677FF; }
  .person-dept { color: #aaa; font-size: 12px; }
  .person-date { font-size: 11px; color: #bbb; margin-left: auto; white-space: nowrap; }
  .person-type { font-size: 11px; border-radius: 4px; padding: 1px 6px; }
  .type-campus { background: #E6F4FF; color: #1677FF; }
  .type-social { background: #F0F5FF; color: #2F54EB; }
  .type-active { background: #FFF7E6; color: #FA8C16; }
  .type-passive { background: #FFF0F0; color: #FF2442; }

  /* Placeholder */
  .placeholder { text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }
  .placeholder-icon { font-size: 40px; margin-bottom: 12px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 28px 32px; max-width: 480px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #aaa; }
  .modal-body { font-size: 14px; color: #555; line-height: 1.7; }
  .modal-num { font-size: 36px; font-weight: 800; color: #111; margin-bottom: 8px; }

    .panel-content { padding: 12px 16px 30px; }
    .tabs { margin: 12px 16px 0; }
    .warning-bar { margin: 12px 16px 0; }
    .dept-header { padding: 14px 16px 12px; }
    .dept-body { padding: 12px 16px; }
    .expand-btn { margin: 0 16px; width: calc(100% - 32px); }
    .subdept-panel { padding: 0 16px 12px; }
    .people-section { padding: 0 16px 12px; }
  }

function calcGap(d) { return d.totalHc - d.predictHc; }

function gapPill(gap) {
  if (gap > 0) return '<span class="gap-pill vacancy">空编 ' + gap + '</span>';

}

function matchTag(d) {
  const map = { excellent:'match-excellent', mate:'match-mate', in_doubt:'match-doubt' };
  const cls = map[d.matchingDegreeTag] || 'match-na';
  const name = d.matchingDegreeName || '—';
  return '<span class="match-tag ' + cls + '">' + name + '</span>';
}

function miniBar(current, total) {
  const pct = total > 0 ? Math.min(current / total, 1.5) : 0;
  const displayPct = total > 0 ? Math.round(current / total * 100) : 0;
  let color = '#1677FF';
  if (pct > 1.1) color = '#00A854';
  else if (pct < 0.8) color = '#FF2442';
  return '<div class="mini-bar-wrap"><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:' + Math.min(pct*100,100) + '%;background:' + color + '"></div></div><span class="mini-bar-pct">' + displayPct + '%</span></div>';
}

function donutSVG(current, total, size) {
  size = size || 64;
  const r = (size - 8) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? Math.min(current / total, 1) : 0;
  const filled = circ * pct;
  const empty = circ - filled;
  const color = pct >= 1 ? '#00A854' : pct >= 0.8 ? '#1677FF' : '#FF2442';
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#EAECF0" stroke-width="7"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="7" stroke-dasharray="' + filled + ' ' + empty + '" stroke-dashoffset="' + (circ * 0.25) + '" stroke-linecap="round" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>' +
    '<text x="' + cx + '" y="' + (cy + 1) + '" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#111">' + current + '</text>' +
    '</svg>';
}

// ========== GLOBAL STATS ==========
function computeGlobalStats() {
  const all = [
    ...DATA.subDepts_5000273,
    ...DATA.subDepts_5003008.filter(d => d.departmentId === '5003008'),
    ...DATA.subDepts_5000785
  ];
  // Only use the top-level dept rows (departmentId == key)
  const depts = [
    DATA.subDepts_5000273.find(d => d.departmentId === '5000273'),
    DATA.subDepts_5003008.find(d => d.departmentId === '5003008'),
    DATA.subDepts_5000785.find(d => d.departmentId === '5000785')
  ].filter(Boolean);

  let totalCurrent = 0, totalTarget = 0, totalIn = 0, totalOut = 0, totalPredict = 0;
  depts.forEach(d => {
    totalCurrent += d.currentHc;
    totalTarget += d.totalHc;
    totalIn += d.transInHc;
    totalOut += d.transOutHc;
    totalPredict += d.predictHc;
  });
  const gap = totalTarget - totalPredict;
  return { totalCurrent, totalTarget, totalIn, totalOut, totalPredict, gap };
}

// ========== WARNINGS ==========
function buildWarnings() {
  const items = [];
  const allSubs = [
    ...(DATA.subDepts_5000273[0].children || []),
    ...(DATA.subDepts_5003008[0].children || []),
  ];
  allSubs.forEach(d => {
    const gap = calcGap(d);
    if (gap >= 3) items.push({ name: d.departmentName, gap, type: 'vacancy' });
    else if (gap <= -4) items.push({ name: d.departmentName, gap, type: 'overstaff' });
  });
  return items;
}

// ========== RENDER OVERVIEW ==========
function renderOverview() {
  const s = computeGlobalStats();
  const cards = [
    { label: '在职 HC', value: s.totalCurrent, cls: '', detail: '全部部门当前在职人数合计' },
    { label: '目标 HC', value: s.totalTarget, cls: '', detail: '全部部门 HC 编制目标合计' },
    { label: '流入在途', value: s.totalIn, cls: 'blue', detail: '待入职人员（transInHc）合计' },
    { label: '流出在途', value: s.totalOut, cls: 'red', detail: '待离职人员（transOutHc）合计' },
    { label: '预计在职', value: s.totalPredict, cls: '', detail: '预计在职 = 在职 + 流入 - 流出' },
    { label: 'HC Gap', value: (s.gap > 0 ? '+' : '') + s.gap, cls: s.gap > 0 ? 'red' : s.gap < 0 ? 'green' : '', detail: 'Gap = 目标HC - 预计在职\n正数为空编，负数为超编' },
    { label: '在招职位', value: DATA.recruitStat.allPositionCount, cls: 'blue', detail: '当前在招 JD 数: ' + DATA.recruitStat.allPositionCount + '\n候选人在途: ' + DATA.recruitStat.allPositionProcessCount }
  ];
  const bar = document.getElementById('overviewBar');
  bar.innerHTML = cards.map((c, i) =>
    '<div class="ov-card" onclick="showOvModal(' + i + ')" data-idx="' + i + '">' +
      '<div class="ov-label">' + c.label + '</div>' +
      '<div class="ov-value ' + c.cls + '">' + c.value + '</div>' +
    '</div>'
  ).join('');
  window._ovCards = cards;
}

function showOvModal(i) {
  const c = window._ovCards[i];
  document.getElementById('modal-title').textContent = c.label;
  document.getElementById('modal-body').innerHTML = '<div class="modal-num">' + c.value + '</div><div>' + c.detail.replace(/\n/g,'<br>') + '</div>';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.currentTarget.classList.contains('modal-close'))
    document.getElementById('modal').classList.remove('open');
}

// ========== RENDER WARNINGS ==========
function renderWarnings() {
  const items = buildWarnings();
  if (!items.length) return;
  const bar = document.getElementById('warningBar');
  bar.style.display = 'flex';
  document.getElementById('warningItems').innerHTML = items.map(it =>
    '<span class="warning-tag">' + it.name + (it.type === 'vacancy' ? ' 空编+' + it.gap : ' 超编' + it.gap) + '</span>'
  ).join('');
}

// ========== RENDER DEPT CARD ==========
function renderDeptCard(dept, entryList, dimissionList, cardId) {
  const gap = calcGap(dept);
  const subs = dept.children || [];

  // Flow breakdown
  const campus = entryList.filter(e => e.empTagList && e.empTagList.includes('2'));
  const social = entryList.filter(e => !e.empTagList || !e.empTagList.includes('2'));
  const dimActive = dimissionList.filter(d => d.dimissionTypeName === '主动离职');
  const dimPassive = dimissionList.filter(d => d.dimissionTypeName === '被动离职');

  // Header
  let html = '<div class="dept-card" id="' + cardId + '">';
  html += '<div class="dept-header">';
  html += '<div class="dept-title-row">';
  html += '<span class="dept-name">' + dept.departmentName + '</span>';
  if (dept.managerLevelName) html += '<span class="dept-level">' + dept.managerLevelName + '</span>';
  html += '<span class="dept-leader">👤 ' + dept.leaderName + '</span>';
  html += gapPill(gap);
  html += '</div>';

  // Stats row
  html += '<div class="dept-stats">';
  html += '<div class="stat-item"><div class="stat-label">在职</div><div class="stat-value">' + dept.currentHc + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">目标</div><div class="stat-value">' + dept.totalHc + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">流入</div><div class="stat-value in">+' + dept.transInHc + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">流出</div><div class="stat-value out">-' + dept.transOutHc + '</div></div>';
  html += '<div class="stat-item"><div class="stat-label">预计在职</div><div class="stat-value">' + dept.predictHc + '</div></div>';
  html += '</div>';
  html += '</div>'; // dept-header

  // Body: donut + flow
  html += '<div class="dept-body"><div class="dept-metrics">';
  html += '<div class="donut-wrap">';
  html += donutSVG(dept.currentHc, dept.totalHc, 68);
  html += '<div class="donut-legend">';
  html += '<div class="legend-item"><span class="legend-dot" style="background:#1677FF"></span>在职 ' + dept.currentHc + '</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:#EAECF0"></span>目标 ' + dept.totalHc + '</div>';
  html += '</div></div>';

  html += '<div class="flow-section">';
  // Inflow
  html += '<div class="flow-block"><div class="flow-block-title">🟢 流入细分</div><div class="flow-items">';
  html += '<div class="flow-item"><span class="flow-item-name">社招待入职</span><span class="flow-item-val positive">' + social.length + '</span></div>';
  html += '<div class="flow-item"><span class="flow-item-name">校招</span><span class="flow-item-val positive">' + campus.length + '</span></div>';
  html += '<div class="flow-item"><span class="flow-item-name">内转</span><span class="flow-item-val neutral">0</span></div>';
  html += '</div></div>';
  // Outflow
  html += '<div class="flow-block"><div class="flow-block-title">🔴 流出细分</div><div class="flow-items">';
  html += '<div class="flow-item"><span class="flow-item-name">主动离职</span><span class="flow-item-val negative">' + dimActive.length + '</span></div>';
  html += '<div class="flow-item"><span class="flow-item-name">被动离职</span><span class="flow-item-val negative">' + dimPassive.length + '</span></div>';
  html += '<div class="flow-item"><span class="flow-item-name">转出</span><span class="flow-item-val neutral">0</span></div>';
  html += '</div></div>';
  html += '</div>'; // flow-section
  html += '</div></div>'; // dept-metrics, dept-body

  // Sub-dept expand button (only if has children)
  if (subs.length > 0) {
    html += '<button class="expand-btn" onclick="toggleSubs(\'' + cardId + '\')">';
    html += '<span class="expand-icon" id="icon-' + cardId + '">▶</span>';
    html += '查看 ' + subs.length + ' 个子组详情';
    html += '</button>';

    // Sub-dept table
    html += '<div class="subdept-panel" id="subs-' + cardId + '">';
    html += '<table class="subdept-tbl"><thead><tr>';
    html += '<th>子组</th><th>负责人</th><th>在职</th><th>目标</th><th>Gap</th><th>完成率</th><th>匹配度</th>';
    html += '</tr></thead><tbody>';
    subs.forEach(s => {
      const sg = calcGap(s);
      let rowCls = '';
      if (sg >= 3) rowCls = 'row-vacancy';
      else if (sg <= -4) rowCls = 'row-overstaff';
      html += '<tr class="' + rowCls + '">';
      html += '<td>' + s.departmentName + '</td>';
      html += '<td>' + s.leaderName + '</td>';
      html += '<td><strong>' + s.currentHc + '</strong></td>';
      html += '<td>' + s.totalHc + '</td>';
      html += '<td>' + gapPill(sg) + '</td>';
      html += '<td>' + miniBar(s.currentHc, s.totalHc) + '</td>';
      html += '<td>' + matchTag(s) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }

  // People section
  if (entryList.length > 0 || dimissionList.length > 0) {
    html += '<div class="people-section">';
    if (entryList.length > 0) {
      html += '<div class="people-block"><div class="people-block-title">📥 待入职 (' + entryList.length + ')</div><div class="people-list">';
      entryList.forEach(p => {
        const isCampus = p.empTagList && p.empTagList.includes('2');
        html += '<div class="person-row">';
        html += '<span class="person-name"><a href="https://hr.xiaohongshu.com/next/employee/' + p.employeeId + '" target="_blank">' + p.showName + '</a></span>';
        html += '<span class="person-dept">' + p.departmentName + '</span>';
        html += '<span class="' + (isCampus ? 'type-campus' : 'type-social') + ' person-type">' + (isCampus ? '校招' : '社招') + '</span>';
        html += '<span class="person-date">' + p.entryDate + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    }
    if (dimissionList.length > 0) {
      html += '<div class="people-block"><div class="people-block-title">📤 待离职 (' + dimissionList.length + ')</div><div class="people-list">';
      dimissionList.forEach(p => {
        const isActive = p.dimissionTypeName === '主动离职';
        html += '<div class="person-row">';
        html += '<span class="person-name"><a href="https://hr.xiaohongshu.com/next/employee/' + p.employeeId + '" target="_blank">' + p.showName + '</a></span>';
        html += '<span class="person-dept">' + p.departmentName + '</span>';
        html += '<span class="' + (isActive ? 'type-active' : 'type-passive') + ' person-type">' + p.dimissionTypeName + '</span>';
        html += '<span class="person-date">' + p.lastDate + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    }
    html += '</div>';
  }

  html += '</div>'; // dept-card
  return html;
}

// ========== TAB SWITCH ==========
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}
