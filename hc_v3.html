<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HC Dashboard v3 · 招财出品</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF2442;
  --red-light: #FF6B7A;
  --red-bg: #FFF0F2;
  --orange: #FF8C00;
  --green: #00C853;
  --blue: #1565C0;
  --gray-1: #F8F9FA;
  --gray-2: #F0F2F5;
  --gray-3: #E4E8EC;
  --gray-5: #8D9BAB;
  --gray-7: #4A5568;
  --gray-9: #1A202C;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 16px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: var(--gray-1);
  color: var(--gray-9);
  min-height: 100vh;
}

/* ── TOP NAV ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-3);
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 18px;
  color: var(--red);
  flex: 1;
}
.topbar-logo svg { width: 28px; height: 28px; }
.topbar-meta {
  font-size: 12px;
  color: var(--gray-5);
  display: flex;
  align-items: center;
  gap: 6px;
}
.badge-live {
  background: var(--red);
  color: white;
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  animation: pulse-badge 2s infinite;
}
@keyframes pulse-badge {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ── TABS ── */
.tab-bar {
  display: flex;
  gap: 0;
  padding: 0 32px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-3);
  overflow-x: auto;
}
.tab-btn {
  padding: 14px 24px;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-5);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.tab-btn:hover { color: var(--red); }
.tab-btn.active {
  color: var(--red);
  border-bottom-color: var(--red);
  font-weight: 700;
}

/* ── MAIN CONTAINER ── */
.main { padding: 28px 32px 48px; max-width: 1400px; margin: 0 auto; }
.tab-pane { display: none; animation: fadeSlide 0.3s ease; }
.tab-pane.active { display: block; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── SECTION TITLE ── */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-5);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title:first-child { margin-top: 0; }
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-3);
}

/* ── DONUT GRID ── */
.donut-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 8px;
}
.donut-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 24px;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: default;
}
.donut-card:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-lg);
}
.donut-wrapper {
  position: relative;
  width: 110px;
  height: 110px;
  flex-shrink: 0;
}
.donut-wrapper svg { width: 110px; height: 110px; overflow: visible; }
.donut-track { fill: none; stroke: var(--gray-2); stroke-width: 10; }
.donut-fill {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 55px 55px;
  transition: stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1);
}
.donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.donut-pct {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
}
.donut-pct-label { font-size: 10px; color: var(--gray-5); font-weight: 500; }
.donut-info { flex: 1; min-width: 0; }
.donut-name { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
.donut-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--gray-5);
  margin-bottom: 5px;
}
.donut-row span:last-child { font-weight: 600; color: var(--gray-7); }
.donut-tag {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.tag-green { background: #E8F5E9; color: #2E7D32; }
.tag-orange { background: #FFF3E0; color: #E65100; }
.tag-red { background: var(--red-bg); color: var(--red); }
.tag-blue { background: #E3F2FD; color: var(--blue); }

/* ── BUBBLE CHART ── */
.bubble-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow-sm);
  margin-top: 20px;
}
.bubble-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.bubble-title { font-size: 15px; font-weight: 700; }
.bubble-legend {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--gray-5);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
#bubbleSvg { width: 100%; display: block; }
.bubble-tooltip {
  position: fixed;
  background: rgba(26,32,44,0.92);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 12px;
  line-height: 1.7;
  pointer-events: none;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.15s;
  backdrop-filter: blur(8px);
  max-width: 200px;
}
.bubble-tooltip.show { opacity: 1; }

/* pulse animation for real data bubbles */
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}
.pulse-ring {
  animation: pulse-ring 2s ease-out infinite;
  transform-origin: center;
}

/* ── FLOW CARD ── */
.flow-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}
.flow-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.flow-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--gray-3);
}
.flow-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.flow-icon-in { background: #E8F5E9; }
.flow-icon-out { background: var(--red-bg); }
.flow-card-title { font-size: 15px; font-weight: 700; }
.flow-total {
  font-size: 12px;
  color: var(--gray-5);
  margin-left: auto;
}
.flow-total strong { font-size: 20px; font-weight: 800; color: var(--gray-9); }
.flow-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-2);
  display: flex;
  align-items: center;
  gap: 12px;
}
.flow-item:last-child { border-bottom: none; padding-bottom: 0; }
.flow-dept-tag {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.flow-dept-tag-in { background: #E8F5E9; color: #2E7D32; }
.flow-dept-tag-out { background: var(--red-bg); color: var(--red); }
.flow-names { font-size: 13px; color: var(--gray-5); flex: 1; }
.flow-count {
  font-size: 22px;
  font-weight: 800;
  margin-left: auto;
}
.flow-count-in { color: #2E7D32; }
.flow-count-out { color: var(--red); }

/* ── KPI CARDS (Detail tabs) ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 18px 16px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  border: 2px solid transparent;
}
.kpi-card:hover {
  border-color: var(--red);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.kpi-card.active-kpi { border-color: var(--red); background: var(--red-bg); }
.kpi-label { font-size: 11px; color: var(--gray-5); margin-bottom: 6px; font-weight: 500; }
.kpi-value {
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-sub { font-size: 11px; color: var(--gray-5); }

/* ── BAR RANKING ── */
.bar-ranking {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
}
.bar-ranking-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.bar-label { font-size: 12px; color: var(--gray-7); width: 130px; flex-shrink: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track {
  flex: 1;
  height: 12px;
  background: var(--gray-2);
  border-radius: 6px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}
.bar-pct { font-size: 12px; font-weight: 700; width: 48px; text-align: right; }

/* ── DEPT TABLE ── */
.dept-table-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: 20px;
}
.dept-table-card table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.dept-table-card thead th {
  background: var(--gray-1);
  padding: 12px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-5);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.dept-table-card thead th:not(:first-child) { text-align: center; }
.dept-table-card tbody tr {
  border-bottom: 1px solid var(--gray-2);
  transition: background 0.15s;
  cursor: pointer;
}
.dept-table-card tbody tr:hover { background: var(--gray-1); }
.dept-table-card tbody tr:last-child { border-bottom: none; }
.dept-table-card td { padding: 13px 16px; }
.dept-table-card td:not(:first-child) { text-align: center; }
.dept-name { font-weight: 600; }
.dept-real-badge {
  display: inline-block;
  background: #E8F5E9;
  color: #2E7D32;
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 6px;
  vertical-align: middle;
}
.dept-est-badge {
  display: inline-block;
  background: var(--gray-2);
  color: var(--gray-5);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 700;
  margin-left: 6px;
  vertical-align: middle;
}
.pct-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 12px;
}
.mini-bar-wrap { display: flex; align-items: center; gap: 8px; }
.mini-bar-track {
  width: 80px;
  height: 6px;
  background: var(--gray-2);
  border-radius: 3px;
  overflow: hidden;
}
.mini-bar-fill { height: 100%; border-radius: 3px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: white;
  border-radius: 20px;
  padding: 32px;
  width: 600px;
  max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gray-2);
  border: none;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  font-family: inherit;
}
.modal-close:hover { background: var(--gray-3); }

/* ── COUNTUP ── */
.countup { display: inline-block; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .donut-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .flow-grid { grid-template-columns: 1fr; }
  .main { padding: 16px; }
}
</style>
</head>

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function pct(actual, budget) {
  if (!budget) return 0;
  return Math.round(actual / budget * 100);
}
function pctColor(p) {
  if (p >= 100) return '#1565C0';
  if (p >= 90) return '#00C853';
  if (p >= 75) return '#FF8C00';
  return '#FF2442';
}
function pctTag(p) {
  if (p >= 100) return ['tag-blue','超编'];
  if (p >= 90) return ['tag-green','良好'];
  if (p >= 75) return ['tag-orange','偏低'];
  return ['tag-red','缺编'];
}
function groupBy(arr, key) {
  return arr.reduce((acc, d) => {
    (acc[d[key]] = acc[d[key]] || []).push(d);
    return acc;
  }, {});
}
function l1Summary(l1Name) {
  const rows = BUDGET_DATA.filter(d => d.l1 === l1Name);
  const budget = rows.reduce((s,d)=>s+d.budget,0);
  const actual = rows.reduce((s,d)=>s+d.actual,0);
  const transIn = rows.reduce((s,d)=>s+d.transIn,0);
  const transOut = rows.reduce((s,d)=>s+d.transOut,0);
  const pending = rows.reduce((s,d)=>s+d.pending,0);
  const leaving = rows.reduce((s,d)=>s+d.leaving,0);
  return { budget, actual, transIn, transOut, pending, leaving };
}

/* ═══════════════════════════════════════════
   COUNT UP ANIMATION
═══════════════════════════════════════════ */
function countUp(el, end, duration = 900, suffix = '') {
  const start = 0;
  const startTime = performance.now();
  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const val = Math.round(start + (end - start) * eased);
    el.textContent = val + suffix;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

const L1_NAMES = ['商业化', '财务职能+DI', '交易'];
const RADIUS = 45, CX = 55, CY = 55;
const CIRC = 2 * Math.PI * RADIUS;

function buildDonut(l1) {
  const s = l1Summary(l1);
  const p = pct(s.actual, s.budget);
  const color = pctColor(p);
  const [tagClass, tagLabel] = pctTag(p);
  const dash = Math.min(p / 100, 1.3) * CIRC;
  const gap = CIRC - dash;

  const card = document.createElement('div');
  card.className = 'donut-card';
  card.innerHTML = `
    <div class="donut-wrapper">
      <svg viewBox="0 0 110 110">
        <circle class="donut-track" cx="${CX}" cy="${CY}" r="${RADIUS}"/>
        <circle class="donut-fill" id="df-${l1}" cx="${CX}" cy="${CY}" r="${RADIUS}"
          stroke="${color}"
          stroke-dasharray="0 ${CIRC}"/>
      </svg>
      <div class="donut-center">
        <div class="donut-pct countup" id="dpct-${l1}" style="color:${color}">0%</div>
        <div class="donut-pct-label">满编率</div>
      </div>
    </div>
    <div class="donut-info">
      <div class="donut-name">${l1}</div>
      <div class="donut-row"><span>在职</span><span class="countup" id="dact-${l1}">0</span></div>
      <div class="donut-row"><span>编制</span><span>${s.budget}</span></div>
      <div class="donut-row"><span>缺口</span><span>${Math.max(0, s.budget - s.actual)}</span></div>
      <div class="donut-row"><span>流入在途</span><span style="color:#00C853">+${s.transIn}</span></div>
      <div class="donut-row"><span>流出在途</span><span style="color:#FF2442">-${s.transOut}</span></div>
      <span class="donut-tag ${tagClass}">${tagLabel}</span>
    </div>
  `;
  document.getElementById('donutGrid').appendChild(card);

  // Animate after a tick
  setTimeout(() => {
    const fillEl = document.getElementById('df-' + l1);
    fillEl.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    countUp(document.getElementById('dpct-' + l1), p, 1000, '%');
    countUp(document.getElementById('dact-' + l1), s.actual, 1000);
  }, 100);
}

L1_NAMES.forEach(n => buildDonut(n));

/* ═══════════════════════════════════════════
   BUBBLE CHART (pure SVG)
═══════════════════════════════════════════ */
(function() {
  const svg = document.getElementById('bubbleSvg');
  const tooltip = document.getElementById('bTooltip');
  const W = 900, H = 360;
  const PAD = { l: 60, r: 30, t: 20, b: 48 };
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Filter to rows with actual > 0 only (skip no-permission depts)
  const data = BUDGET_DATA.filter(d => d.actual > 0);
  const maxBudget = Math.max(...data.map(d => d.budget));
  const maxActual = Math.max(...data.map(d => d.actual > 0 ? d.actual : d.budget));

  // X: 満編率 0~130%, Y: actual (or budget if no actual)
  function xPos(d) {
    const p = d.actual > 0 ? d.actual / d.budget : 0.5;
    return PAD.l + Math.min(p, 1.3) / 1.3 * cW;
  }
  function yPos(d) {
    const val = d.actual > 0 ? d.actual : d.budget * 0.5;
    return PAD.t + cH - (val / maxActual) * cH;
  }
  function bubbleR(d) {
    const area = (d.budget / maxBudget);
    return 16 + area * 44;
  }

  // Grid lines
  const ns = 'http://www.w3.org/2000/svg';
  function el(tag, attrs, parent) {
    const e = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
    parent.appendChild(e);
    return e;
  }

  // X axis ticks: 0, 25, 50, 75, 90, 100, 125%
  [0, 25, 50, 75, 90, 100, 125].forEach(pv => {
    const x = PAD.l + (pv / 130) * cW;
    el('line', { x1:x, y1:PAD.t, x2:x, y2:PAD.t+cH, stroke:'#E4E8EC', 'stroke-width':1 }, svg);
    const t = el('text', { x, y:PAD.t+cH+18, 'text-anchor':'middle', fill:'#8D9BAB', 'font-size':'10', 'font-family':'Inter' }, svg);
    t.textContent = pv + '%';
    // 90% & 100% markers
    if (pv === 90 || pv === 100) {
      el('line', { x1:x, y1:PAD.t, x2:x, y2:PAD.t+cH, stroke: pv===100?'#1565C0':'#FF8C00', 'stroke-width':1.5, 'stroke-dasharray':'4,3', opacity:0.7 }, svg);
    }
  });
  // Y axis label
  const yLabel = el('text', { x:14, y:PAD.t+cH/2, transform:`rotate(-90,14,${PAD.t+cH/2})`, 'text-anchor':'middle', fill:'#8D9BAB', 'font-size':'10', 'font-family':'Inter' }, svg);
  yLabel.textContent = '在职人数';
  const xLabel = el('text', { x:PAD.l+cW/2, y:H-6, 'text-anchor':'middle', fill:'#8D9BAB', 'font-size':'10', 'font-family':'Inter' }, svg);
  xLabel.textContent = '满编率';

  // Axes
  el('line', { x1:PAD.l, y1:PAD.t+cH, x2:PAD.l+cW, y2:PAD.t+cH, stroke:'#CBD5E0', 'stroke-width':1.5 }, svg);
  el('line', { x1:PAD.l, y1:PAD.t, x2:PAD.l, y2:PAD.t+cH, stroke:'#CBD5E0', 'stroke-width':1.5 }, svg);

  // Draw bubbles
  data.forEach(d => {
    const x = xPos(d);
    const y = yPos(d);
    const r = bubbleR(d);
    const hasData = d.actual > 0;
    const p = hasData ? Math.round(d.actual / d.budget * 100) : 0;
    const color = pctColor(p);
    const alpha = hasData ? 0.85 : 0.32;

    const g = el('g', { class:'bubble-g', style:'cursor:pointer' }, svg);

    if (d.real) {
      // pulse ring
      const ring = el('circle', { cx:x, cy:y, r:r, fill:'none', stroke:color, 'stroke-width':2, opacity:0.5, class:'pulse-ring' }, g);
    }

    el('circle', { cx:x, cy:y, r:r, fill:color, opacity:alpha, filter: d.real ? `url(#glow)` : 'none' }, g);
    // Label inside if big enough
    if (r > 22) {
      const lb = el('text', { x, y: y - 4, 'text-anchor':'middle', fill:'white', 'font-size': r > 30 ? '9' : '8', 'font-weight':'700', 'font-family':'Inter', 'pointer-events':'none' }, g);
      lb.textContent = d.l2.length > 6 ? d.l2.slice(0,5)+'…' : d.l2;
      const lb2 = el('text', { x, y: y + 9, 'text-anchor':'middle', fill:'white', 'font-size':'9', 'font-family':'Inter', 'pointer-events':'none' }, g);
      lb2.textContent = hasData ? p + '%' : '估算';
    }

    g.addEventListener('mousemove', e => {
      tooltip.innerHTML = `<strong>${d.l1} · ${d.l2}</strong><br>编制：${d.budget}<br>在职：${hasData ? d.actual : '估算'}<br>满编率：${hasData ? p + '%' : '—'}<br>流入在途：+${d.transIn} 流出：-${d.transOut}`;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.classList.add('show');
    });
    g.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });

  // glow filter
  const defs = el('defs', {}, svg);
  const filter = el('filter', { id:'glow', x:'-50%', y:'-50%', width:'200%', height:'200%' }, defs);
  const feGaussianBlur = el('feGaussianBlur', { stdDeviation:'3', result:'blur' }, filter);
  const feMerge = el('feMerge', {}, filter);
  el('feMergeNode', { in:'blur' }, feMerge);
  el('feMergeNode', { in:'SourceGraphic' }, feMerge);
})();

  } else if (kpiLabel === '流入在途') {
    const withIn = rows.filter(d => d.transIn > 0);
    body = withIn.length ? withIn.map(d => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F2F5;font-size:13px"><span>${d.l2}</span><strong style="color:#00C853">+${d.transIn}</strong></div>`).join('') : '<div style="color:#8D9BAB;font-size:13px;padding:12px 0">暂无流入在途</div>';
  } else if (kpiLabel === '流出在途') {
    const withOut = rows.filter(d => d.transOut > 0);
    body = withOut.length ? withOut.map(d => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F2F5;font-size:13px"><span>${d.l2}</span><strong style="color:#FF8C00">-${d.transOut}</strong></div>`).join('') : '<div style="color:#8D9BAB;font-size:13px;padding:12px 0">暂无流出在途</div>';
  } else if (kpiLabel === '招聘中') {
    const withP = rows.filter(d => d.pending > 0);
    body = withP.length ? withP.map(d => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F2F5;font-size:13px"><span>${d.l2}</span><strong style="color:#1565C0">${d.pending} 人</strong></div>`).join('') : '<div style="color:#8D9BAB;font-size:13px;padding:12px 0">暂无在招岗位</div>';
  }
  document.getElementById('modalBody').innerHTML = body || '<div style="color:#8D9BAB;font-size:13px">暂无数据</div>';
  document.getElementById('kpiModal').classList.add('open');
}
function closeModal() {
  document.getElementById('kpiModal').classList.remove('open');
}
document.getElementById('kpiModal').addEventListener('click', e => {
  if (e.target === document.getElementById('kpiModal')) closeModal();
});

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const target = document.getElementById('tab-' + btn.dataset.tab);
    target.classList.add('active');
    // Trigger bar animations on tab open
    setTimeout(() => animateBars(), 100);
    // Trigger KPI countups
    setTimeout(() => {
      target.querySelectorAll('.kpi-value[data-val]').forEach(el => {
        const v = parseInt(el.dataset.val);
        const suf = el.dataset.suffix || '';
        countUp(el, v, 800, suf);
      });
    }, 150);
  });
});

/* ═══════════════════════════════════════════
   BAR ANIMATION (on-demand + initial)
═══════════════════════════════════════════ */
function animateBars() {
  document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
    el.style.width = el.dataset.w + '%';
  });
}

/* ═══════════════════════════════════════════
   INITIAL ANIMATIONS
═══════════════════════════════════════════ */
window.addEventListener('load', () => {
  setTimeout(() => {
    animateBars();
    // Overview countups in flow cards
    document.querySelectorAll('.countup[data-val]').forEach(el => {
      countUp(el, parseInt(el.dataset.val), 900);
    });
  }, 300);
});
</script>
</body>
</html>
