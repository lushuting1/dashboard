  return [4, '第四梯队'];
}

// ── D3 力导向图 ──────────────────────────────────────────────
const container = document.getElementById('graph');
const W = container.clientWidth, H = container.clientHeight;

const svg = d3.select('#graph').append('svg')
  .attr('width', W).attr('height', H);

const defs = svg.append('defs');
// 箭头markers
[['green','#27AE60'],['gray','#B0BEC5'],['red','#E74C3C']].forEach(([id, color]) => {
  defs.append('marker')
    .attr('id', `arr-${id}`).attr('viewBox','0 -5 10 10')
    .attr('refX', 18).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d','M0,-5L10,0L0,5').attr('fill', color);
});

const g = svg.append('g');

// zoom
svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));

const simulation = d3.forceSimulation(nodesData)
  .force('link', d3.forceLink(linksData).id(d => d.id).distance(d => {
    if (d.isExtra) return 200;
    if (d.score === '3.5') return 220;
    if (d.score === '3.75' || d.score === '4') return 170;
    return 190;
  }).strength(0.22))
  .force('charge', d3.forceManyBody().strength(-1200))
  .force('center', d3.forceCenter(W/2, H/2).strength(0.08))
  .force('collision', d3.forceCollide(d => d.isExtra ? 40 : 58))
  .force('x', d3.forceX(d => d.isExtra ? W/2 : W/2).strength(d => d.isExtra ? 0.25 : 0.04))
  .force('y', d3.forceY(d => d.isExtra ? H*0.82 : H/2).strength(d => d.isExtra ? 0.35 : 0.04));

// 边
const link = g.append('g').selectAll('line')
  .data(linksData).join('line')
  .attr('class', 'link')
  .attr('stroke', d => SCORE_COLOR[d.score] || '#CCC')
  .attr('stroke-width', d => d.score === '3.5' ? 2.5 : (d.score === '3.75' || d.score === '4' ? 2.5 : 1.2))
  .attr('stroke-dasharray', d => d.score === '3.5' ? '6,3' : null)
  .attr('stroke-opacity', d => d.isExtra ? 0.4 : 0.75)
  .attr('marker-end', d => {
    if (d.score === '3.75' || d.score === '4' || d.score === 'A') return 'url(#arr-green)';
    if (d.score === '3.5') return 'url(#arr-red)';
    return 'url(#arr-gray)';
  });

// 节点
const node = g.append('g').selectAll('g')
  .data(nodesData).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

// 节点圆
node.append('circle')
  .attr('r', d => d.isExtra ? 22 : Math.max(26, 22 + d.pct375 / 10))
  .attr('fill', d => COLOR[d.group])
  .attr('stroke', d => (!d.isExtra && d.pct375 >= 70) ? 'white' : '#E2E8F0')
  .attr('stroke-width', d => (!d.isExtra && d.pct375 >= 70) ? 3.5 : 1.8)
  .style('filter', 'drop-shadow(0 2px 4px rgba(0,0,0,0.18))');

// 节点文字
node.append('text')
  .attr('text-anchor', 'middle').attr('dy', '-0.2em')
  .attr('fill', 'white').attr('font-size', 12).attr('font-weight', '700')
  .attr('pointer-events', 'none')
  .text(d => d.id);

node.filter(d => !d.isExtra).append('text')
  .attr('text-anchor', 'middle').attr('dy', '1em')
  .attr('fill', 'rgba(255,255,255,0.88)').attr('font-size', 10)
  .attr('pointer-events', 'none')
  .text(d => d.pct375 + '%');

// tooltip & click
const tooltip = document.getElementById('tooltip');

node.on('mouseover', (e, d) => {
  if (d.isExtra) return;
  tooltip.style.opacity = 1;
  tooltip.innerHTML = `<b>${d.id}</b><br>${d.dept} · 业${d.workScore}/组${d.orgScore}<br>评价${d.total}条 · 3.75+: ${d.pct375}%`;
}).on('mousemove', e => {
  tooltip.style.left = (e.offsetX + 14) + 'px';
  tooltip.style.top  = (e.offsetY - 10) + 'px';
}).on('mouseout', () => { tooltip.style.opacity = 0; });

node.on('click', (e, d) => {
  if (d.isExtra) return;
  showDetail(d);
  // 高亮相关节点
  const connectedIds = new Set([d.id]);
  linksData.forEach(l => {
    if (l.source.id === d.id || l.source === d.id) connectedIds.add(typeof l.target === 'object' ? l.target.id : l.target);
    if (l.target.id === d.id || l.target === d.id) connectedIds.add(typeof l.source === 'object' ? l.source.id : l.source);
  });
  node.classed('dimmed', n => !connectedIds.has(n.id));
  link.style('opacity', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return (s === d.id || t === d.id) ? 1 : 0.08;
  });
});

svg.on('click', e => {
  if (e.target === svg.node()) {
    node.classed('dimmed', false);
    link.style('opacity', null);
  }
});

function showDetail(d) {
  const [tierN, tierName] = getTier(d.pct375);
  const tierClass = 'tier-' + tierN;
  const pctColor = d.pct375 >= 70 ? '#27AE60' : d.pct375 >= 40 ? '#E67E22' : '#E74C3C';
  
  let reviewsHtml = '';
  if (d.topReviews && d.topReviews.length) {
    reviewsHtml += `<div class="review-section"><div class="review-label">代表性评语</div>`;
    d.topReviews.forEach(r => {
      reviewsHtml += `<div class="review-card">
        <div class="review-meta">${r.reviewer} · ${r.type === 'peer' ? 'Peer' : '合作方'} · ${r.score}</div>
        <div class="review-text">${r.content}</div>
      </div>`;
    });
    reviewsHtml += '</div>';
  }
  if (d.lowReviews && d.lowReviews.length) {
    reviewsHtml += `<div class="review-section"><div class="review-label" style="color:#E74C3C">⚠️ 差评（3.5）</div>`;
    d.lowReviews.forEach(r => {
      reviewsHtml += `<div class="review-card low">
        <div class="review-meta">${r.reviewer} · Peer · ${r.score}</div>
        <div class="review-text">${r.content}</div>
      </div>`;
    });
    reviewsHtml += '</div>';
  }

  document.getElementById('detail-placeholder').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-name">${d.id}</div>
    <div class="detail-dept">${d.fullName} · ${d.dept}</div>
    <div class="tier-badge ${tierClass}">${tierName}</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">业务绩效</div>
        <div class="stat-value" style="color:#3A86D0">${d.workScore || '—'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">组织绩效</div>
        <div class="stat-value" style="color:#8B5CF6">${d.orgScore || '—'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">3.75+ 口碑占比</div>
        <div class="stat-value" style="color:${pctColor}">${d.pct375}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${d.pct375}%;background:${pctColor}"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">评语总量</div>
        <div class="stat-value">${d.total}</div>
        <div class="stat-sub">含 ${d.n35} 票差评</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Peers 均分</div>
        <div class="stat-value" style="font-size:15px">${d.peer_avg}</div>
        <div class="stat-sub">${d.peer_n} 位 L1 评价</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">合作方均分</div>
        <div class="stat-value" style="font-size:15px">${d.coop_avg}</div>
        <div class="stat-sub">${d.coop_n} 位合作方</div>
      </div>
    </div>
    ${reviewsHtml}
  `;
}

// tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// 边过滤控制
let currentFilter = 'all';
let hideExtra = false;

function filterEdges(type) {
  if (type === 'extra') {
    hideExtra = !hideExtra;
    document.querySelectorAll('.ctrl-btn')[3].classList.toggle('active', hideExtra);
    applyFilter();
    return;
  }
  currentFilter = type;
  document.querySelectorAll('.ctrl-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','375','35'][i] === type);
  });
  applyFilter();
}

function applyFilter() {
  link.style('display', d => {
    if (hideExtra && d.isExtra) return 'none';
    if (currentFilter === '375' && !['3.75','4','A'].includes(d.score)) return 'none';
    if (currentFilter === '35' && d.score !== '3.5') return 'none';
    return null;
  });
}
</script>
</body>
</html>
